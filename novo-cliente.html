<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDR System — Novo Cliente</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; -webkit-font-smoothing: antialiased; }

body {
  font-family: 'Inter', sans-serif;
  display: flex;
  min-height: 100vh;
}

/* ── LADO ESQUERDO ── */
.left {
  width: 420px;
  min-height: 100vh;
  background: #1B4332;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 48px 44px;
  flex-shrink: 0;
}

.left-logo {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800;
  font-size: 1.5rem;
  color: #fff;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.left-logo span {
  background: rgba(255,255,255,.15);
  color: rgba(255,255,255,.9);
  font-size: 0.65rem;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 6px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.left-body { flex: 1; display: flex; flex-direction: column; justify-content: center; }

.left-body h1 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800;
  font-size: 2rem;
  color: #fff;
  line-height: 1.25;
  margin-bottom: 16px;
}

.left-body p {
  font-size: 0.95rem;
  color: rgba(255,255,255,.6);
  line-height: 1.65;
  max-width: 300px;
}

.left-footer {
  font-size: 0.8rem;
  color: rgba(255,255,255,.3);
}

/* ── LADO DIREITO ── */
.right {
  flex: 1;
  background: #FAFAFA;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 32px;
}

.form-wrap {
  width: 100%;
  max-width: 400px;
}

.form-wrap h2 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: 1.35rem;
  color: #111827;
  margin-bottom: 6px;
}

.form-wrap .sub {
  font-size: 0.875rem;
  color: #6B7280;
  margin-bottom: 32px;
}

.field { margin-bottom: 18px; }

label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  color: #374151;
  margin-bottom: 6px;
  letter-spacing: 0.2px;
}

input {
  width: 100%;
  background: #fff;
  border: 1.5px solid #E5E7EB;
  border-radius: 10px;
  padding: 11px 14px;
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  color: #111827;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}

input:focus {
  border-color: #2D6A4F;
  box-shadow: 0 0 0 3px rgba(45,106,79,.1);
}

input::placeholder { color: #9CA3AF; }

.btn {
  margin-top: 8px;
  width: 100%;
  background: #2D6A4F;
  color: #fff;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  border-radius: 10px;
  padding: 13px;
  border: none;
  cursor: pointer;
  transition: background .15s;
}
.btn:hover { background: #1B4332; }
.btn:disabled { background: #A7F3D0; color: #6B7280; cursor: not-allowed; }

.msg {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 0.875rem;
  display: none;
  line-height: 1.5;
}
.msg.ok { background: #ECFDF5; border: 1px solid #A7F3D0; color: #065F46; display: block; }
.msg.err { background: #FEF2F2; border: 1px solid #FECACA; color: #991B1B; display: block; }

/* Mobile */
@media (max-width: 720px) {
  body { flex-direction: column; }
  .left { width: 100%; min-height: auto; padding: 32px 24px; }
  .left-body h1 { font-size: 1.5rem; }
  .left-body p, .left-footer { display: none; }
  .right { padding: 32px 20px; }
}
</style>
</head>
<body>

<!-- Esquerda -->
<div class="left">
  <div class="left-logo">EDR System <span>Admin</span></div>
  <div class="left-body">
    <h1>Onboarding de novos clientes</h1>
    <p>Crie a conta de uma nova construtora no EDR System. O acesso é imediato após o cadastro.</p>
  </div>
  <div class="left-footer">sistema.edreng.com.br · acesso restrito</div>
</div>

<!-- Direita -->
<div class="right">
  <div class="form-wrap">

    <!-- Lock -->
    <div id="lock">
      <h2>Acesso restrito</h2>
      <p class="sub">Digite a senha para continuar</p>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="lockPwd" placeholder="••••••••" value="edr@admin2026" onkeydown="if(event.key==='Enter')unlock()">
      </div>
      <button class="btn" onclick="unlock()">Entrar</button>
      <div id="lockMsg" class="msg"></div>
    </div>

    <!-- Form -->
    <div id="form" style="display:none">
      <h2>Novo cliente</h2>
      <p class="sub">Preencha os dados da construtora</p>

      <div class="field">
        <label>Nome da empresa</label>
        <input type="text" id="empresa" placeholder="Ex: Rodrigues Construtora">
      </div>
      <div class="field">
        <label>Nome do responsável</label>
        <input type="text" id="nome" placeholder="Ex: João Rodrigues">
      </div>
      <div class="field">
        <label>E-mail do admin</label>
        <input type="email" id="email" placeholder="joao@empresa.com.br">
      </div>
      <div class="field">
        <label>Senha inicial</label>
        <input type="text" id="senha" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="field">
        <label>Plano</label>
        <select id="plano" style="width:100%;height:42px;padding:0 12px;border:1.5px solid #E5E7EB;border-radius:10px;font-family:Inter,sans-serif;font-size:0.9rem;color:#111827;background:#fff;outline:none;cursor:pointer;">
          <option value="trial">Trial (1 obra, 3 usuários)</option>
          <option value="essencial">Essencial (3 obras, 5 usuários)</option>
          <option value="profissional">Profissional (5 obras, 10 usuários)</option>
          <option value="construtora">Construtora (ilimitado)</option>
        </select>
      </div>

      <button class="btn" id="btn" onclick="criar()">Criar cliente</button>
      <div id="msg" class="msg"></div>
    </div>

  </div>
</div>

<script>
const _VER = 'edr-04161855';
console.log('%c EDR System %c v' + _VER.split('-')[1] + ' ','background:#14532d;color:#4ade80;font-weight:700;padding:3px 7px;border-radius:3px 0 0 3px','background:#4ade80;color:#14532d;font-weight:700;padding:3px 7px;border-radius:0 3px 3px 0');

const SUPABASE_URL = 'https://mepzoxoahpwcvvlymlfh.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lcHpveG9haHB3Y3Z2bHltbGZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzAyMDUsImV4cCI6MjA4Nzg0NjIwNX0.2_4hqT2vzM5Dw3iesOF_5V7esxkZafDnMFpDkCSBVlE';
const SENHA_ACESSO = 'edr@admin2026';

function unlock() {
  if (document.getElementById('lockPwd').value === SENHA_ACESSO) {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('form').style.display = 'block';
  } else {
    const m = document.getElementById('lockMsg');
    m.textContent = 'Senha incorreta.';
    m.className = 'msg err';
  }
}

async function criar() {
  const empresa = document.getElementById('empresa').value.trim();
  const nome    = document.getElementById('nome').value.trim();
  const email   = document.getElementById('email').value.trim();
  const senha   = document.getElementById('senha').value.trim();
  const plano   = document.getElementById('plano').value;
  const msg     = document.getElementById('msg');
  const btn     = document.getElementById('btn');

  msg.className = 'msg';
  msg.textContent = '';

  if (!empresa || !email || !senha) {
    msg.textContent = 'Preencha empresa, e-mail e senha.';
    msg.className = 'msg err';
    return;
  }
  if (senha.length < 6) {
    msg.textContent = 'Senha precisa ter pelo menos 6 caracteres.';
    msg.className = 'msg err';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Criando...';

  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/criar-cliente`, {
      method: 'POST',
      headers: { 'apikey': ANON_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ empresa, nome, email, password: senha, adminSecret: SENHA_ACESSO, plan: plano })
    });
    const data = await res.json();

    if (!res.ok || data.error) {
      msg.textContent = (data.error || 'Erro desconhecido.') + (data.detail ? ' — ' + data.detail : '');
      msg.className = 'msg err';
    } else {
      msg.textContent = `✓ Cliente "${empresa}" criado! Login: ${email}`;
      msg.className = 'msg ok';
      alert(`✓ Cliente criado com sucesso!\n\nEmpresa: ${empresa}\nLogin: ${email}\nSenha: ${senha}`);
      document.getElementById('empresa').value = '';
      document.getElementById('nome').value = '';
      document.getElementById('email').value = '';
      document.getElementById('senha').value = '';
    }
  } catch (e) {
    msg.textContent = 'Erro de conexão: ' + e.message;
    msg.className = 'msg err';
  }

  btn.disabled = false;
  btn.textContent = 'Criar cliente';
}
</script>
</body>
</html>
