<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0">
<title>EDR — Cronograma Gantt</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  :root { --bg:#0a0a0a; --bg2:#111113; --bg3:#161618; --borda:rgba(255,255,255,0.06); --verde:#4ade80; --texto:#e2e4e9; --texto2:#8b8fa0; --texto3:#555; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--texto); min-height:100vh; }

  .toolbar { position:sticky; top:0; z-index:90; background:var(--bg2); border-bottom:1px solid var(--borda); padding:10px 16px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .toolbar-title { font-size:15px; font-weight:800; letter-spacing:-0.5px; margin-right:auto; }
  .toolbar-title span { color:var(--verde); }
  .tb-btn { padding:6px 14px; border-radius:8px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); color:var(--texto2); font-size:12px; cursor:pointer; font-family:inherit; }
  .tb-btn:hover { background:rgba(255,255,255,0.06); }
  select { background:var(--bg2); color:var(--texto); border:1px solid var(--borda); border-radius:8px; padding:6px 10px; font-family:inherit; font-size:12px; outline:none; }
  select option { background:var(--bg2); color:var(--texto); }

  .legenda { display:flex; gap:12px; flex-wrap:wrap; padding:8px 16px; background:var(--bg2); border-bottom:1px solid var(--borda); }
  .legenda-item { display:flex; align-items:center; gap:4px; font-size:11px; }
  .legenda-dot { width:10px; height:10px; border-radius:3px; }

  /* Layout split: sidebar tarefas + timeline */
  .gantt-split { display:flex; overflow:hidden; }
  .gantt-sidebar { width:260px; min-width:260px; background:var(--bg2); border-right:1px solid var(--borda); overflow-y:auto; }
  .gantt-timeline { flex:1; overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch; }

  /* Sidebar items */
  .gs-group { padding:8px 12px; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; border-bottom:1px solid var(--borda); display:flex; align-items:center; gap:6px; }
  .gs-item { display:flex; align-items:center; gap:8px; padding:6px 12px; border-bottom:1px solid rgba(255,255,255,0.03); height:40px; }
  .gs-bar { width:4px; height:20px; border-radius:2px; flex-shrink:0; }
  .gs-name { font-size:12px; color:var(--texto); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
  .gs-prog { font-size:10px; font-weight:600; min-width:30px; text-align:right; }
  .gs-dates { font-size:9px; color:var(--texto3); }

  /* Timeline bars */
  .gt-header { display:flex; height:40px; border-bottom:1px solid var(--borda); background:var(--bg3); position:sticky; top:0; z-index:5; }
  .gt-header-cell { height:40px; display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--texto2); font-weight:600; border-right:1px solid rgba(255,255,255,0.04); flex-shrink:0; }
  .gt-row { display:flex; height:40px; border-bottom:1px solid rgba(255,255,255,0.03); position:relative; }
  .gt-row:nth-child(even) { background:rgba(255,255,255,0.01); }
  .gt-cell { height:40px; border-right:1px solid rgba(255,255,255,0.02); flex-shrink:0; }
  .gt-bar { position:absolute; height:22px; top:9px; border-radius:6px; display:flex; align-items:center; overflow:hidden; }
  .gt-bar-progress { height:100%; border-radius:6px 0 0 6px; opacity:0.5; }
  .gt-today { position:absolute; top:0; bottom:0; width:2px; background:var(--verde); opacity:0.4; z-index:4; }

  .loading { text-align:center; padding:80px; color:var(--texto3); }

  @media (max-width:768px) {
    .gantt-sidebar { width:180px; min-width:180px; }
    .gs-dates { display:none; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-title">EDR<span>Gantt</span></div>
  <select id="filtro-obra" onchange="carregar()">
    <option value="">Todas as obras</option>
  </select>
  <button class="tb-btn" onclick="setZoom(-1)">−</button>
  <button class="tb-btn" onclick="setZoom(1)">+</button>
  <button class="tb-btn" onclick="scrollHoje()">Hoje</button>
  <button class="tb-btn" onclick="window.location.href='index.html'" style="color:var(--verde);">← Sistema</button>
</div>
<div class="legenda" id="legenda"></div>
<div class="gantt-split">
  <div class="gantt-sidebar" id="sidebar"></div>
  <div class="gantt-timeline" id="timeline"></div>
</div>

<script>
const SU = 'https://mepzoxoahpwcvvlymlfh.supabase.co';
const SK = 'sb_publishable_Z9E8KLU8ZIMcWjD-bMG5gg_eM585qWq';
let db; try { db = window.supabase.createClient(SU, SK); } catch(e) {}

const CORES = [
  { bar:'#2563eb', prog:'#60a5fa', label:'#93c5fd', bg:'rgba(37,99,235,0.15)' },
  { bar:'#9333ea', prog:'#c084fc', label:'#d8b4fe', bg:'rgba(147,51,234,0.15)' },
  { bar:'#ea580c', prog:'#fb923c', label:'#fdba74', bg:'rgba(234,88,12,0.15)' },
  { bar:'#0d9488', prog:'#2dd4bf', label:'#5eead4', bg:'rgba(13,148,136,0.15)' },
  { bar:'#dc2626', prog:'#f87171', label:'#fca5a5', bg:'rgba(220,38,38,0.15)' },
  { bar:'#ca8a04', prog:'#facc15', label:'#fde047', bg:'rgba(202,138,4,0.15)' },
  { bar:'#059669', prog:'#34d399', label:'#6ee7b7', bg:'rgba(5,150,105,0.15)' },
  { bar:'#4f46e5', prog:'#818cf8', label:'#a5b4fc', bg:'rgba(79,70,229,0.15)' },
];

let tarefas = [];
let obras = {};
let obraCores = {};
let cellWidth = 40; // px por dia
const HOJE = new Date();
HOJE.setHours(0,0,0,0);

async function init() { await carregar(); }

async function carregar() {
  const obraId = document.getElementById('filtro-obra').value;
  try {
    let q = db.from('cronograma_tarefas').select('*, obras(id,nome)').order('ordem').order('data_inicio');
    if (obraId) q = q.eq('obra_id', obraId);
    const { data } = await q;
    tarefas = data || [];

    obras = {};
    tarefas.forEach(t => { if (t.obras?.id) obras[t.obras.id] = t.obras.nome; });

    const sel = document.getElementById('filtro-obra');
    if (sel.options.length <= 1) {
      Object.entries(obras).sort((a,b) => a[1].localeCompare(b[1])).forEach(([id, nome]) => {
        const opt = document.createElement('option');
        opt.value = id; opt.textContent = nome;
        sel.appendChild(opt);
      });
    }

    const obrasUnicas = [...new Set(tarefas.map(t => t.obra_id))];
    obraCores = {};
    obrasUnicas.forEach((id, i) => { obraCores[id] = i % CORES.length; });

    renderLegenda();
    render();
  } catch(e) {
    document.getElementById('sidebar').innerHTML = '<div class="loading">Erro: ' + e.message + '</div>';
  }
}

function renderLegenda() {
  document.getElementById('legenda').innerHTML = Object.entries(obraCores).map(([id, idx]) => {
    const cor = CORES[idx];
    return `<div class="legenda-item"><div class="legenda-dot" style="background:${cor.bar}"></div><span style="color:${cor.label}">${obras[id]||''}</span></div>`;
  }).join('');
}

function render() {
  if (tarefas.length === 0) {
    document.getElementById('sidebar').innerHTML = '<div class="loading">Nenhuma tarefa</div>';
    document.getElementById('timeline').innerHTML = '';
    return;
  }

  // Calcular range de datas
  let minDate = new Date('2099-01-01'), maxDate = new Date('2000-01-01');
  tarefas.forEach(t => {
    const s = new Date(t.data_inicio + 'T00:00:00');
    const e = new Date(t.data_fim + 'T00:00:00');
    if (s < minDate) minDate = s;
    if (e > maxDate) maxDate = e;
  });
  // Adicionar margem
  minDate.setDate(minDate.getDate() - 7);
  maxDate.setDate(maxDate.getDate() + 14);

  const totalDias = Math.ceil((maxDate - minDate) / 86400000);
  const totalWidth = totalDias * cellWidth;

  // Agrupar por obra
  const porObra = {};
  tarefas.forEach(t => {
    const obraId = t.obra_id;
    if (!porObra[obraId]) porObra[obraId] = [];
    porObra[obraId].push(t);
  });

  // Sidebar
  let sideHtml = '';
  // Timeline header (meses + semanas)
  let headerHtml = '';
  let rowsHtml = '';

  // Header: gerar células por semana
  const semanas = [];
  let d = new Date(minDate);
  // Ir pra segunda-feira
  while (d.getDay() !== 1) d.setDate(d.getDate() + 1);
  while (d < maxDate) {
    const semStart = new Date(d);
    const semEnd = new Date(d); semEnd.setDate(semEnd.getDate() + 6);
    const dayOffset = Math.floor((semStart - minDate) / 86400000);
    semanas.push({ start: semStart, offset: dayOffset });
    const label = semStart.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' });
    headerHtml += `<div class="gt-header-cell" style="width:${cellWidth * 7}px;">${label}</div>`;
    d.setDate(d.getDate() + 7);
  }

  // Rows por obra
  Object.entries(porObra).forEach(([obraId, tasks]) => {
    const idx = obraCores[obraId] || 0;
    const cor = CORES[idx];
    const obraNome = obras[obraId] || '';

    // Grupo header na sidebar
    sideHtml += `<div class="gs-group" style="background:${cor.bg};color:${cor.label};"><div class="legenda-dot" style="background:${cor.bar}"></div>${obraNome}</div>`;
    // Grupo header no timeline (linha vazia)
    rowsHtml += `<div class="gt-row" style="background:${cor.bg};height:30px;"></div>`;

    tasks.forEach(t => {
      const subs = t.subitens || [];
      const feitos = subs.filter(s => s.feito).length;
      const prog = subs.length > 0 ? Math.round(feitos / subs.length * 100) : Number(t.progresso) || 0;
      const corProg = prog >= 100 ? '#4ade80' : prog >= 50 ? '#fbbf24' : prog > 0 ? '#f97316' : '#ef4444';
      const inicio = t.data_inicio ? new Date(t.data_inicio + 'T00:00:00').toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'}) : '';
      const fim = t.data_fim ? new Date(t.data_fim + 'T00:00:00').toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'}) : '';

      // Sidebar item
      sideHtml += `<div class="gs-item">
        <div class="gs-bar" style="background:${cor.bar};"></div>
        <div style="flex:1;overflow:hidden;">
          <div class="gs-name">${t.nome}</div>
          <div class="gs-dates">${inicio} → ${fim}</div>
        </div>
        <div class="gs-prog" style="color:${corProg};">${subs.length ? feitos+'/'+subs.length : prog+'%'}</div>
      </div>`;

      // Timeline bar
      const startDate = new Date(t.data_inicio + 'T00:00:00');
      const endDate = new Date(t.data_fim + 'T00:00:00');
      const leftDays = Math.floor((startDate - minDate) / 86400000);
      const durDays = Math.max(Math.ceil((endDate - startDate) / 86400000), 1);
      const left = leftDays * cellWidth;
      const width = durDays * cellWidth;
      const progWidth = Math.round(width * prog / 100);

      rowsHtml += `<div class="gt-row">
        <div class="gt-bar" style="left:${left}px;width:${width}px;background:${cor.bar};">
          <div class="gt-bar-progress" style="width:${progWidth}px;background:${cor.prog};"></div>
        </div>
      </div>`;
    });
  });

  // Hoje marker
  const hojeDays = Math.floor((HOJE - minDate) / 86400000);
  const hojeLeft = hojeDays * cellWidth;

  document.getElementById('sidebar').innerHTML = sideHtml;
  document.getElementById('timeline').innerHTML = `
    <div style="width:${totalWidth}px;position:relative;">
      <div class="gt-header">${headerHtml}</div>
      <div style="position:relative;">
        ${rowsHtml}
        <div class="gt-today" style="left:${hojeLeft}px;"></div>
      </div>
    </div>
  `;

  // Sincronizar scroll vertical
  const sidebar = document.getElementById('sidebar');
  const timeline = document.getElementById('timeline');
  timeline.addEventListener('scroll', () => { sidebar.scrollTop = timeline.scrollTop; });
  sidebar.addEventListener('scroll', () => { timeline.scrollTop = sidebar.scrollTop; });
}

function setZoom(dir) {
  cellWidth = Math.max(10, Math.min(80, cellWidth + dir * 10));
  render();
}

function scrollHoje() {
  const timeline = document.getElementById('timeline');
  const today = timeline.querySelector('.gt-today');
  if (today) {
    const left = parseInt(today.style.left) || 0;
    timeline.scrollTo({ left: Math.max(left - 200, 0), behavior: 'smooth' });
  }
}

init();
</script>
</body>
</html>
