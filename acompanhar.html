<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acompanhamento de Obra — EDR</title>
<link rel="icon" href="favicon.ico">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js?v=04151515"></script>
<style>
  :root {
    --primary: #2d6a4f;
    --primary-light: #40916c;
    --primary-bg: #d8f3dc;
    --text: #1b1b1b;
    --text2: #555;
    --text3: #888;
    --border: #e0e0e0;
    --surface: #fff;
    --bg: #f5f7f5;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); min-height: 100vh; }

  /* Header */
  .header { background: var(--primary); color: #fff; padding: 20px 20px 16px; }
  .header-logo { font-size: 11px; font-weight: 700; letter-spacing: 2px; opacity: .7; text-transform: uppercase; margin-bottom: 6px; }
  .header-title { font-size: 20px; font-weight: 800; line-height: 1.2; }
  .header-sub { font-size: 13px; opacity: .75; margin-top: 4px; }
  .header-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(255,255,255,.15); border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 700; margin-top: 10px; }

  /* Progress */
  .progress-card { background: var(--surface); margin: 16px; border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
  .progress-label { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .progress-pct { font-size: 40px; font-weight: 900; color: var(--primary); line-height: 1; }
  .progress-pct span { font-size: 18px; font-weight: 600; color: var(--text3); }
  .progress-bar-wrap { background: #e8f5e9; border-radius: 8px; height: 10px; margin: 12px 0 8px; overflow: hidden; }
  .progress-bar { background: linear-gradient(90deg, var(--primary), var(--primary-light)); height: 100%; border-radius: 8px; transition: width .8s ease; }
  .progress-info { font-size: 12px; color: var(--text3); }

  /* Section */
  .section { margin: 0 16px 16px; }
  .section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .section-title::before { content: ''; display: block; width: 3px; height: 14px; background: var(--primary); border-radius: 2px; }

  /* Cronograma */
  .etapa-item { background: var(--surface); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .etapa-prog { width: 40px; height: 40px; border-radius: 50%; border: 3px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: var(--primary); flex-shrink: 0; position: relative; }
  .etapa-prog.done { border-color: var(--primary); background: var(--primary-bg); }
  .etapa-info { flex: 1; min-width: 0; }
  .etapa-nome { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .etapa-data { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .etapa-bar-wrap { height: 4px; background: #eee; border-radius: 2px; margin-top: 5px; }
  .etapa-bar { height: 100%; background: var(--primary); border-radius: 2px; }

  /* Diário */
  .diario-card { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .diario-data { font-size: 11px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .diario-clima { background: var(--primary-bg); color: var(--primary); border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .diario-relato { font-size: 13px; line-height: 1.6; color: var(--text2); white-space: pre-wrap; }
  .diario-fotos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-top: 10px; }
  .diario-fotos.single { grid-template-columns: 1fr; }
  .diario-fotos.triple { grid-template-columns: repeat(3, 1fr); }
  .diario-foto { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 8px; cursor: pointer; }
  .sem-relato { color: var(--text3); font-style: italic; }

  /* QR */
  .qr-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; margin: 0 0 16px; }
  .qr-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 999; align-items: center; justify-content: center; }
  .qr-modal.active { display: flex; }
  .qr-box { background: #fff; border-radius: 16px; padding: 28px; text-align: center; max-width: 320px; width: 90%; }
  .qr-box h3 { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
  .qr-box p { font-size: 12px; color: var(--text3); margin-bottom: 18px; }
  #qr-canvas { display: flex; justify-content: center; }
  .qr-close { margin-top: 18px; padding: 10px 24px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }

  /* Lightbox */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 1000; align-items: center; justify-content: center; }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 8px; }
  .lightbox-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,.2); border: none; border-radius: 50%; width: 36px; height: 36px; color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  /* States */
  .loading { text-align: center; padding: 60px 20px; color: var(--text3); }
  .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { margin: 40px 20px; background: #fff3f3; border: 1px solid #fcc; border-radius: var(--radius); padding: 24px; text-align: center; }
  .error-box h2 { color: #c00; font-size: 16px; margin-bottom: 8px; }
  .error-box p { color: var(--text3); font-size: 13px; }

  /* Footer */
  .footer { text-align: center; padding: 20px; color: var(--text3); font-size: 11px; }
  .footer a { color: var(--primary); text-decoration: none; font-weight: 700; }

  /* Info grid */
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .info-item { background: var(--surface); border-radius: 10px; padding: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .info-item-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 3px; }
  .info-item-value { font-size: 14px; font-weight: 700; color: var(--text); }

  /* Status badge */
  .status-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .status-em_andamento { background: #e8f5e9; color: var(--primary); }
  .status-concluida { background: #e3f2fd; color: #1565c0; }
  .status-paralisada { background: #fff3e0; color: #e65100; }
  .status-planejamento { background: #f3e5f5; color: #6a1b9a; }
</style>
</head>
<body>

<div id="app">
  <div class="loading">
    <div class="loading-spinner"></div>
    <div>Carregando obra...</div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="fecharLightbox()">
  <button class="lightbox-close" onclick="fecharLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- Modal QR -->
<div class="qr-modal" id="qr-modal" onclick="fecharQr()">
  <div class="qr-box" onclick="event.stopPropagation()">
    <h3>Compartilhar obra</h3>
    <p>Escaneie para acompanhar o andamento</p>
    <div id="qr-canvas"></div>
    <button class="qr-close" onclick="fecharQr()">Fechar</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://mepzoxoahpwcvvlymlfh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lcHpveG9haHB3Y3Z2bHltbGZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzAyMDUsImV4cCI6MjA4Nzg0NjIwNX0.2_4hqT2vzM5Dw3iesOF_5V7esxkZafDnMFpDkCSBVlE';

const STATUS_LABEL = {
  em_andamento: 'Em andamento',
  concluida: 'Concluída',
  paralisada: 'Paralisada',
  planejamento: 'Planejamento',
};

function fmtData(d) {
  if (!d) return '—';
  const [y, m, dia] = d.split('-');
  return `${dia}/${m}/${y}`;
}

function slugFromUrl() {
  return new URLSearchParams(location.search).get('slug') || '';
}

async function carregarObra(slug) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_obra_publica`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ p_slug: slug }),
  });
  return res.json();
}

function abrirLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('active');
}
function fecharLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.getElementById('lightbox-img').src = '';
}

let _qrGerado = false;
function abrirQr() {
  document.getElementById('qr-modal').classList.add('active');
  if (!_qrGerado) {
    new QRCode(document.getElementById('qr-canvas'), {
      text: location.href,
      width: 200,
      height: 200,
      colorDark: '#2d6a4f',
      colorLight: '#ffffff',
    });
    _qrGerado = true;
  }
}
function fecharQr() {
  document.getElementById('qr-modal').classList.remove('active');
}

function renderEtapas(cronograma) {
  if (!cronograma || cronograma.length === 0) return '<p style="color:var(--text3);font-size:13px;">Cronograma não cadastrado.</p>';
  return cronograma.map(t => {
    const pct = Math.min(100, Math.max(0, Number(t.progresso || 0)));
    const done = pct === 100;
    const dataFim = t.data_fim ? `Previsão: ${fmtData(t.data_fim)}` : '';
    return `
      <div class="etapa-item">
        <div class="etapa-prog${done ? ' done' : ''}">${pct}%</div>
        <div class="etapa-info">
          <div class="etapa-nome">${t.nome || 'Etapa'}</div>
          ${dataFim ? `<div class="etapa-data">${dataFim}</div>` : ''}
          <div class="etapa-bar-wrap"><div class="etapa-bar" style="width:${pct}%"></div></div>
        </div>
      </div>`;
  }).join('');
}

function renderDiario(diario) {
  if (!diario || diario.length === 0) return '<p style="color:var(--text3);font-size:13px;padding:12px 0;">Nenhum registro no diário ainda.</p>';
  return diario.map(r => {
    const fotos = Array.isArray(r.fotos) ? r.fotos.filter(Boolean) : [];
    let fotosHtml = '';
    if (fotos.length > 0) {
      const cls = fotos.length === 1 ? 'single' : fotos.length === 3 ? 'triple' : '';
      fotosHtml = `<div class="diario-fotos ${cls}">
        ${fotos.map(f => `<img class="diario-foto" src="${f}" loading="lazy" onclick="abrirLightbox(this.src)" alt="Foto da obra">`).join('')}
      </div>`;
    }
    const climaLabel = { sol: '☀️ Sol', nublado: '☁️ Nublado', chuva: '🌧️ Chuva', parcial: '⛅ Parcial' };
    const climaBadge = r.clima ? `<span class="diario-clima">${climaLabel[r.clima] || r.clima}</span>` : '';
    const relato = r.relato ? `<div class="diario-relato">${r.relato.replace(/</g, '&lt;')}</div>` : `<div class="diario-relato sem-relato">Sem relato escrito.</div>`;
    return `
      <div class="diario-card">
        <div class="diario-data">📅 ${fmtData(r.data)} ${climaBadge}</div>
        ${relato}
        ${fotosHtml}
      </div>`;
  }).join('');
}

async function init() {
  const slug = slugFromUrl();
  const app = document.getElementById('app');

  if (!slug) {
    app.innerHTML = `<div class="error-box"><h2>Link inválido</h2><p>Este link não contém um código de obra válido.</p></div>`;
    return;
  }

  try {
    const data = await carregarObra(slug);

    if (data.erro || !data.obra) {
      app.innerHTML = `<div class="error-box"><h2>Obra não encontrada</h2><p>O código <strong>${slug}</strong> não corresponde a nenhuma obra cadastrada.</p></div>`;
      return;
    }

    const { obra, progresso, cronograma, diario } = data;
    const statusLabel = STATUS_LABEL[obra.status] || obra.status || 'Em andamento';
    const statusClass = `status-${obra.status || 'em_andamento'}`;
    const totalEtapas = Array.isArray(cronograma) ? cronograma.length : 0;
    const etapasConcluidas = Array.isArray(cronograma) ? cronograma.filter(t => Number(t.progresso) === 100).length : 0;

    document.title = `${obra.nome} — EDR Acompanhamento`;

    app.innerHTML = `
      <div class="header">
        <div class="header-logo">EDR Engenharia</div>
        <div class="header-title">${obra.nome}</div>
        <div class="header-sub">${obra.cidade || ''}${obra.area_m2 ? ` · ${obra.area_m2} m²` : ''}</div>
        <div><span class="header-badge">${statusLabel}</span></div>
      </div>

      <div style="padding: 16px 16px 0;">
        <div class="info-grid">
          <div class="info-item">
            <div class="info-item-label">Contratante</div>
            <div class="info-item-value" style="font-size:13px;">${obra.contratante || '—'}</div>
          </div>
          <div class="info-item">
            <div class="info-item-label">Previsão término</div>
            <div class="info-item-value" style="font-size:13px;">${fmtData(obra.data_prevista)}</div>
          </div>
        </div>
      </div>

      <div style="padding: 0 16px;">
        <div class="progress-card">
          <div class="progress-label">Avanço físico geral</div>
          <div class="progress-pct">${progresso}<span>%</span></div>
          <div class="progress-bar-wrap">
            <div class="progress-bar" style="width: ${progresso}%"></div>
          </div>
          <div class="progress-info">${etapasConcluidas} de ${totalEtapas} etapas concluídas</div>
        </div>
      </div>

      <div class="section" style="padding: 0 16px 16px;">
        <button class="qr-btn" onclick="abrirQr()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3"/><rect x="19" y="14" width="2" height="2"/><rect x="14" y="19" width="2" height="2"/><rect x="18" y="19" width="3" height="2"/></svg>
          Compartilhar QR Code
        </button>
      </div>

      <div class="section">
        <div class="section-title">Cronograma</div>
        ${renderEtapas(cronograma)}
      </div>

      <div class="section">
        <div class="section-title">Diário de Obra</div>
        ${renderDiario(diario)}
      </div>

      <div class="footer">
        Gerenciado pela <a href="https://sistema.edreng.com.br" target="_blank">EDR Engenharia</a>
      </div>
    `;

  } catch (e) {
    app.innerHTML = `<div class="error-box"><h2>Erro ao carregar</h2><p>${e.message}</p></div>`;
  }
}

init();
</script>
</body>
</html>
