.mp-btn.confirm{background:#1B4332;color:#fff;}

#loading{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.55);z-index:10002;}
#loading.open{display:flex;}

<script>
const APP_VERSION = 'v04181700';
const ASAAS_PLANOS = [
  { id:'essencial', nome:'Essencial', valor:397.00,
    desc:'Pra quem está estruturando o controle. 3 obras simultâneas.',
    features:['3 obras simultâneas','Dashboard + lançamentos por etapa','Folha quinzenal com PDF','Fluxo de caixa','Importação NF-e XML','Estoque de materiais','Relatório de lucro básico','3 usuários inclusos'] },
  { id:'profissional', nome:'Profissional', valor:697.00, destaque:true,
    desc:'Até 5 obras + PCI/MCMV, diárias integradas e XML.',
    features:['Até 5 obras simultâneas','Tudo do Essencial','PCI/MCMV completo (20 cat.)','Diárias de obra automáticas','Orçamento paramétrico','CRM de leads','Garantias NBR 15575','Termo de entrega PDF','Relatório P&L completo','Até 8 usuários','Suporte WhatsApp'] },
  { id:'construtora', nome:'Construtora', valor:997.00,
    desc:'Obras ilimitadas + usuários ilimitados + suporte prioritário.',
    features:['Obras ilimitadas','Tudo do Profissional','Usuários ilimitados','Suporte prioritário (2h)','Onboarding personalizado','Treinamento da equipe','Configurações por obra','Relatórios sob demanda'] },
];

let COMPANY=null, COMPANY_USER=null, ASSINATURA=null;

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';}
function fmt(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function fmtD(d){if(!d)return '—';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('pt-BR');}

let _mpCb=null;
function _mpRes(r){if(_mpCb)_mpCb(r);fecharModalMP();}
function fecharModalMP(){document.getElementById('mp-mod-ov').classList.remove('open');_mpCb=null;}
function abrirConfirmMP({tag='Confirmação',titulo='Tem certeza?',texto='',okLabel='Confirmar',cancelLabel='Cancelar',danger=false}){
  document.getElementById('mp-mod-tag').textContent=tag;
  document.getElementById('mp-mod-tit').textContent=titulo;
  document.getElementById('mp-mod-txt').innerHTML=texto;
  const b=document.getElementById('mp-btn-ok');b.textContent=okLabel;b.className='mp-btn '+(danger?'danger':'confirm');
  document.getElementById('mp-btn-cancel').textContent=cancelLabel;
  document.getElementById('mp-mod-ov').classList.add('open');
  return new Promise(r=>{_mpCb=r;});
}

async function sair(){
  try{await fetch(`${SUPABASE_URL}/auth/v1/logout`,{method:'POST',headers:{apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+((JSON.parse(localStorage.getItem('edr_auth')||'{}').access_token||'')||SUPABASE_ANON_KEY)}});}catch(_){}
  localStorage.removeItem('edr_auth');
  window.location.href='index.html';
}

async function getValidToken(){
  const auth = JSON.parse(localStorage.getItem('edr_auth')||'{}');
  if (!auth.access_token) return null;
  if (auth.expires_at && auth.expires_at - 30000 < Date.now()){
    if (!auth.refresh_token) return null;
    try {
      const rr = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`,{
        method:'POST',
        headers:{apikey:SUPABASE_ANON_KEY,'content-type':'application/json'},
        body: JSON.stringify({refresh_token: auth.refresh_token}),
      });
      if (!rr.ok) return null;
      const nd = await rr.json();
      const novo = { ...auth, access_token: nd.access_token, refresh_token: nd.refresh_token, expires_at: Date.now() + (nd.expires_in*1000) };
      localStorage.setItem('edr_auth', JSON.stringify(novo));
      return nd.access_token;
    } catch(_) { return null; }
  }
  return auth.access_token;
}

async function init(){
  const token = await getValidToken();
  if (!token){ document.getElementById('nao-logado').style.display='block'; return; }

  // busca user via JWT
  const ur = await fetch(`${SUPABASE_URL}/auth/v1/user`,{headers:{apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+token}});
  if (!ur.ok){ document.getElementById('nao-logado').style.display='block'; return; }
  const user = await ur.json();

  // busca company_user (primeira company ativa)
  const cr = await fetch(`${SUPABASE_URL}/rest/v1/company_users?user_id=eq.${user.id}&active=eq.true&select=*,companies(*)`,{headers:{apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+token}});
  const arr = await cr.json();
  if (!arr?.length){ document.getElementById('nao-logado').style.display='block'; return; }
  COMPANY_USER = arr[0];
  COMPANY = arr[0].companies;

  // busca assinatura
  const ar = await fetch(`${SUPABASE_URL}/rest/v1/assinaturas?company_id=eq.${COMPANY.id}&status=in.(ativa,atrasada,suspensa)&order=created_at.desc&limit=1`,{headers:{apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+token}});
  const ass = await ar.json();
  ASSINATURA = ass?.[0] || null;

  document.getElementById('subempresa').textContent = COMPANY.name;
  document.getElementById('wrap').style.display='block';
  render();
}

function renderBanner(){
  const st=COMPANY.status_pagamento||'trial';
  const dias=COMPANY.dias_atraso||0;
  const trialEnd=COMPANY.trial_ends_at;
  const nd=ASSINATURA?.proximo_vencimento;
  let ic='',t='',s='';
  if(st==='trial'){ic='🎁';t='Você está em período de teste';s=trialEnd?`Teste grátis até ${fmtD(String(trialEnd).slice(0,10))}. Escolha um plano abaixo.`:'Escolha um plano abaixo.';}
  else if(st==='ativo'){ic='✅';t='Assinatura ativa';s=nd?`Próxima cobrança: ${fmtD(nd)} — ${fmt(ASSINATURA?.valor)}`:'Tudo certo.';}
  else if(st==='atrasado'){ic='⚠️';t='Pagamento em atraso';s=`${dias} dia(s). Bloqueio em ${Math.max(0,7-dias)} dia(s).`;}
  else if(st==='bloqueado'){ic='🚫';t='Acesso bloqueado';s='Regularize o pagamento.';}
  else if(st==='cancelado'){ic='❌';t='Assinatura cancelada';s='Reative escolhendo um plano.';}
  return `<div class="banner ${st}"><div class="banner-ic">${ic}</div><div><div class="banner-tit">${t}</div><div class="banner-sub">${esc(s)}</div></div></div>`;
}

function renderDetalhes(){
  if (!ASSINATURA) return '';
  const forma=({CREDIT_CARD:'Cartão de crédito',PIX:'PIX',BOLETO:'Boleto',UNDEFINED:'A definir'})[ASSINATURA.forma_pagamento]||ASSINATURA.forma_pagamento;
  const cart=ASSINATURA.cartao_ultimos_digitos?`${ASSINATURA.cartao_bandeira||''} •••• ${ASSINATURA.cartao_ultimos_digitos}`:'—';
  return `<div class="sec"><div class="sec-tit">Detalhes da assinatura</div><div class="det-grid">
    <div><div class="det-lab">Plano</div><div class="det-val">${esc(ASSINATURA.plano)}</div></div>
    <div><div class="det-lab">Valor</div><div class="det-val">${fmt(ASSINATURA.valor)}</div></div>
    <div><div class="det-lab">Ciclo</div><div class="det-val">${ASSINATURA.ciclo==='YEARLY'?'Anual':'Mensal'}</div></div>
    <div><div class="det-lab">Forma de pagamento</div><div class="det-val">${esc(forma)}</div></div>
    <div><div class="det-lab">Cartão</div><div class="det-val">${esc(cart)}</div></div>
    <div><div class="det-lab">Próximo vencimento</div><div class="det-val">${fmtD(ASSINATURA.proximo_vencimento)}</div></div>
    <div><div class="det-lab">Último pagamento</div><div class="det-val">${ASSINATURA.ultimo_pagamento_em?new Date(ASSINATURA.ultimo_pagamento_em).toLocaleDateString('pt-BR'):'—'}</div></div>
    <div><div class="det-lab">Status</div><div class="det-val">${esc(ASSINATURA.status)}</div></div>
  </div></div>`;
}

function renderPlanos(){
  const planoAtual = ASSINATURA?.plano || COMPANY?.plan;
  const ehDono = ['dono','admin'].includes(COMPANY_USER?.role);
  const cards = ASAAS_PLANOS.map(p=>{
    const atual = p.id === planoAtual && ASSINATURA;
    const lbl = atual ? 'Plano atual' : (ASSINATURA ? 'Mudar para este' : 'Assinar');
    return `<div class="plano-card ${atual?'atual':''} ${p.destaque?'destaque':''}">
      ${atual?'<span class="plano-badge">SEU PLANO</span>':(p.destaque?'<span class="plano-badge">MAIS ESCOLHIDO</span>':'')}
      <div class="plano-nome">${esc(p.nome)}</div>
      <div class="plano-valor"><span class="plano-valor-n">${fmt(p.valor).replace('R$','R$ ')}</span><span class="plano-valor-c">/mês</span></div>
      <div class="plano-desc">${esc(p.desc)}</div>
      <ul class="plano-feat">${p.features.map(f=>`<li>${esc(f)}</li>`).join('')}</ul>
      <button class="plano-btn ${atual?'ghost':''}" ${atual||!ehDono?'disabled':''} onclick="assinar('${p.id}',${p.valor})">${lbl}</button>
    </div>`;
  }).join('');
  return `<div class="sec"><div class="sec-tit">Planos disponíveis</div><div class="planos-grid">${cards}</div>${!ehDono?'<div style="text-align:center;color:#6B7280;font-size:12px;margin-top:14px;">Apenas dono/admin podem alterar o plano.</div>':''}</div>`;
}

function render(){ document.getElementById('body').innerHTML = renderBanner() + renderDetalhes() + renderPlanos(); }

let _cpfCb=null;
function _cpfSubmit(){
  const v=document.getElementById('cpf-cnpj-input').value.replace(/\D/g,'');
  const err=document.getElementById('cpf-erro');
  if(v.length!==11&&v.length!==14){err.textContent='CPF deve ter 11 dígitos ou CNPJ 14 dígitos.';err.style.display='block';return;}
  err.style.display='none';
  if(_cpfCb)_cpfCb(v);
  document.getElementById('cpf-mod-ov').classList.remove('open');_cpfCb=null;
}
function fecharCpfMod(){document.getElementById('cpf-mod-ov').classList.remove('open');if(_cpfCb)_cpfCb(null);_cpfCb=null;}
function pedirCpfCnpj(){
  document.getElementById('cpf-cnpj-input').value='';
  document.getElementById('cpf-erro').style.display='none';
  document.getElementById('cpf-mod-ov').classList.add('open');
  setTimeout(()=>document.getElementById('cpf-cnpj-input').focus(),50);
  return new Promise(r=>{_cpfCb=r;});
}

async function salvarCnpjCompany(novo){
  const token = await getValidToken();
  const res = await fetch(`${SUPABASE_URL}/rest/v1/companies?id=eq.${COMPANY.id}`,{
    method:'PATCH',
    headers:{apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+token,'content-type':'application/json',Prefer:'return=minimal'},
    body: JSON.stringify({cnpj: novo}),
  });
  return res.ok;
}

async function assinar(planoId, valor){
  const ehDono = ['dono','admin'].includes(COMPANY_USER?.role);
  if (!ehDono){ alert('Apenas dono/admin podem assinar'); return; }

  // Garante CPF/CNPJ valido na company
  const cnpjAtual = (COMPANY?.cnpj || '').replace(/\D/g,'');
  if (cnpjAtual.length !== 11 && cnpjAtual.length !== 14){
    const novo = await pedirCpfCnpj();
    if (!novo) return;
    const ok = await salvarCnpjCompany(novo);
    if (!ok){ alert('Erro ao salvar CPF/CNPJ'); return; }
    COMPANY.cnpj = novo;
  }

  const nomePlano = PLANOS.find(p=>p.id===planoId)?.nome || planoId;
  const ok = await abrirConfirmMP({
    tag:'Confirmar assinatura',
    titulo:`${nomePlano} — ${fmt(valor)}/mês`,
    texto:`Você vai ativar a assinatura <strong>${nomePlano}</strong> por <strong>${fmt(valor)}/mês</strong> e será redirecionado pro pagamento (cartão ou PIX).<br><br>Sem fidelidade. Cancele quando quiser.`,
    okLabel:'Continuar para o pagamento',
  });
  if (!ok) return;
  document.getElementById('loading').classList.add('open');
  try{
    const token = await getValidToken();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/asaas-criar-assinatura`,{
      method:'POST',
      headers:{'authorization':`Bearer ${token}`,'content-type':'application/json','apikey':SUPABASE_ANON_KEY},
      body: JSON.stringify({company_id:COMPANY.id,plano:planoId,valor,ciclo:'MONTHLY',forma_pagamento:'UNDEFINED'}),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || data.error || 'Erro ao criar assinatura');
    if (data.invoice_url) window.open(data.invoice_url,'_blank');
    await init();
  }catch(e){console.error(e);alert('Erro: '+e.message);}
  finally{document.getElementById('loading').classList.remove('open');}
}

console.log(`%c🌲 EDR System — Minha Assinatura ${APP_VERSION}`,'color:#1B4332;font-weight:bold;');
init();
</script>
