<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EDR System V2 — Shell</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════
   EDR SYSTEM V2 — DESIGN SYSTEM (CSS VANILLA)
   Verde Floresta #2D6A4F | Light-first + Dark toggle
   Sidebar always dark #1A1D23
   ══════════════════════════════════════════ */

/* ── RESET & BASE ──────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  transition: background-color .3s, color .3s;
  min-height: 100vh;
  overflow-x: hidden;
}
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
input { font-family: inherit; }

/* ── CSS VARIABLES (LIGHT) ─────────────── */
:root {
  /* Brand */
  --primary: #2D6A4F;
  --primary-hover: #1B4332;
  --primary-light: #D1FAE5;
  --primary-surface: #ECFDF5;
  /* Neutral */
  --bg: #FAFAFA;
  --card: #FFFFFF;
  --border: #E5E7EB;
  --border-light: #F3F4F6;
  /* Text */
  --text-primary: #111827;
  --text-secondary: #6B7280;
  --text-tertiary: #9CA3AF;
  /* Sidebar (always dark) */
  --sidebar-bg: #1A1D23;
  --sidebar-border: #2D3139;
  --sidebar-text: #9CA3AF;
  --sidebar-text-hover: #F3F4F6;
  /* Status */
  --success: #059669;
  --warning: #D97706;
  --error: #DC2626;
  --info: #2563EB;
  /* Radius */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  /* Sizes */
  --sidebar-width: 240px;
  --header-height: 64px;
}

/* ── DARK MODE ─────────────────────────── */
html.dark {
  --bg: #0F1117;
  --card: #1A1D23;
  --border: #2D3139;
  --border-light: #1A1D23;
  --text-primary: #F3F4F6;
  --text-secondary: #9CA3AF;
  --text-tertiary: #6B7280;
  --primary-light: #064E3B;
  --primary-surface: #022c22;
}

/* ── MATERIAL SYMBOLS ──────────────────── */
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  display: inline-block; vertical-align: middle;
  user-select: none;
}

/* ── FONTS ─────────────────────────────── */
.font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
.font-body { font-family: 'Inter', sans-serif; }
.font-label { font-family: 'Space Grotesk', sans-serif; }

/* ══════════════════════════════════════════
   SIDEBAR (sempre dark)
   ══════════════════════════════════════════ */
.sidebar {
  position: fixed; left: 0; top: 0;
  width: var(--sidebar-width); height: 100vh;
  background: var(--sidebar-bg);
  display: flex; flex-direction: column;
  z-index: 50;
  overflow-y: auto; overflow-x: hidden;
  transition: transform .3s ease;
}

/* Brand */
.sidebar-brand {
  padding: 24px 24px 0;
  margin-bottom: 32px;
}
.sidebar-brand-name {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 20px; font-weight: 700;
  color: #fff; letter-spacing: -0.02em;
}
.sidebar-brand-badge {
  display: inline-block;
  background: var(--primary);
  color: #fff; font-size: 10px; font-weight: 700;
  padding: 2px 6px; border-radius: 4px;
  margin-left: 6px; letter-spacing: 0.05em;
}
.sidebar-brand-sub {
  font-family: 'Space Grotesk', sans-serif;
  color: #6B7280; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-top: 4px;
}

/* Groups */
.sidebar-nav { flex: 1; padding: 0 0 16px; }

.sidebar-group-label {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; margin-bottom: 8px; margin-top: 24px;
  cursor: pointer; user-select: none;
}
.sidebar-group-label:first-child { margin-top: 0; }
.sidebar-group-label span:not(.material-symbols-outlined) {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.08em; color: #6B7280;
}
.sidebar-group-label .chevron {
  font-size: 18px; color: #6B7280;
  transition: transform .25s ease;
}
.sidebar-group-label.collapsed .chevron { transform: rotate(-90deg); }

.sidebar-group {
  overflow: hidden;
  transition: max-height .25s ease;
}
.sidebar-group.collapsed { max-height: 0 !important; }

/* Nav buttons */
.nav-btn {
  display: flex; align-items: center; gap: 12px;
  margin: 2px 12px; padding: 8px 12px;
  border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 500;
  color: var(--sidebar-text);
  transition: background .15s, color .15s;
  white-space: nowrap;
}
.nav-btn:hover { background: rgba(255,255,255,.05); color: var(--sidebar-text-hover); }
.nav-btn.active { background: var(--primary); color: #fff; }
.nav-btn .material-symbols-outlined { font-size: 20px; }

/* Sidebar footer */
.sidebar-footer {
  margin-top: auto;
  padding: 16px 12px;
  border-top: 1px solid rgba(255,255,255,.05);
}

/* ══════════════════════════════════════════
   HEADER
   ══════════════════════════════════════════ */
.main-area {
  margin-left: var(--sidebar-width);
  min-height: 100vh;
  display: flex; flex-direction: column;
}

.header {
  height: var(--header-height);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 40;
}

.header-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 20px; font-weight: 700;
  color: var(--text-primary);
}

/* Search */
.header-search {
  position: relative; margin-left: 24px;
}
.header-search input {
  width: 260px; height: 36px;
  padding: 0 12px 0 36px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px; color: var(--text-primary);
  outline: none; transition: border-color .2s, box-shadow .2s;
}
.header-search input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(45,106,79,.12);
}
.header-search input::placeholder { color: var(--text-tertiary); }
.header-search .search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-tertiary); font-size: 18px; pointer-events: none;
}

/* Header right */
.header-right { display: flex; align-items: center; gap: 8px; }

.header-icon-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; color: var(--text-secondary);
  transition: background .15s;
  position: relative;
}
.header-icon-btn:hover { background: var(--border-light); }

.notification-badge {
  position: absolute; top: 4px; right: 4px;
  width: 16px; height: 16px;
  background: var(--error); color: #fff;
  font-size: 10px; font-weight: 700;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--card);
}

.header-divider {
  width: 1px; height: 32px;
  background: var(--border); margin: 0 8px;
}

.header-user { display: flex; align-items: center; gap: 12px; }
.header-user-info { text-align: right; }
.header-user-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
.header-user-role { font-size: 10px; color: var(--text-secondary); }
.header-avatar {
  width: 36px; height: 36px;
  background: var(--primary); color: #fff;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px; font-weight: 700;
}

/* ══════════════════════════════════════════
   CONTENT AREA
   ══════════════════════════════════════════ */
.content { flex: 1; padding: 32px; max-width: 1600px; }

/* View containers */
.view { display: none; }
.view.active { display: block; }

/* ══════════════════════════════════════════
   SKELETON LOADERS
   ══════════════════════════════════════════ */
@keyframes skeleton-pulse {
  0% { opacity: .6; }
  50% { opacity: .3; }
  100% { opacity: .6; }
}
.skeleton {
  background: var(--border);
  border-radius: var(--radius-sm);
  animation: skeleton-pulse 1.5s ease-in-out infinite;
}
.skeleton-text { height: 14px; margin-bottom: 8px; }
.skeleton-text.w-60 { width: 60%; }
.skeleton-text.w-40 { width: 40%; }
.skeleton-text.w-80 { width: 80%; }
.skeleton-title { height: 32px; width: 30%; margin-bottom: 12px; }
.skeleton-card {
  height: 120px; border-radius: var(--radius-md);
  background: var(--border);
  animation: skeleton-pulse 1.5s ease-in-out infinite;
}

/* ══════════════════════════════════════════
   KPI CARDS (design system component)
   ══════════════════════════════════════════ */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 32px; }
.kpi-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 24px;
}
.kpi-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.kpi-icon {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
}
.kpi-icon.green { background: rgba(45,106,79,.1); color: var(--primary); }
.kpi-icon.amber { background: rgba(217,119,6,.1); color: var(--warning); }
.kpi-icon.blue { background: rgba(37,99,235,.1); color: var(--info); }
.kpi-icon.red { background: rgba(220,38,38,.1); color: var(--error); }
.kpi-value {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 32px; font-weight: 800;
  line-height: 1; color: var(--text-primary);
}
.kpi-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-secondary);
  margin-top: 8px;
}
.kpi-trend {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; gap: 2px;
}
.kpi-trend.up { color: var(--success); }
.kpi-trend.down { color: var(--error); }

/* ══════════════════════════════════════════
   CARDS & TABLE (reusable)
   ══════════════════════════════════════════ */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.card-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 16px; font-weight: 700;
  color: var(--text-primary);
}
.card-body { padding: 24px; }

/* Tables */
.edr-table { width: 100%; text-align: left; border-collapse: collapse; }
.edr-table thead {
  background: var(--bg);
}
.edr-table th {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text-secondary);
  padding: 12px 24px; font-weight: 500;
}
.edr-table td {
  padding: 16px 24px;
  font-size: 14px; color: var(--text-primary);
  border-top: 1px solid var(--border);
}
.edr-table tr:hover td { background: var(--bg); }

/* Badges */
.badge {
  display: inline-block;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 10px; font-weight: 700;
  padding: 3px 8px; border-radius: 999px;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.badge-success { background: #ECFDF5; color: #059669; }
.badge-warning { background: #FFFBEB; color: #D97706; }
.badge-error { background: #FEF2F2; color: #DC2626; }
.badge-info { background: #EFF6FF; color: #2563EB; }
.badge-neutral { background: var(--border-light); color: var(--text-secondary); }
html.dark .badge-success { background: rgba(5,150,105,.15); }
html.dark .badge-warning { background: rgba(217,119,6,.15); }
html.dark .badge-error { background: rgba(220,38,38,.15); }
html.dark .badge-info { background: rgba(37,99,235,.15); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600;
  transition: background .15s, transform .1s;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-ghost { color: var(--primary); }
.btn-ghost:hover { background: var(--primary-surface); }

/* ══════════════════════════════════════════
   MODAL SYSTEM
   ══════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  width: 90%; max-width: 600px;
  max-height: 85vh; overflow-y: auto;
  transform: translateY(20px);
  transition: transform .25s ease;
}
.modal-overlay.active .modal-box { transform: translateY(0); }
.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 18px; font-weight: 700;
}
.modal-close {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; color: var(--text-tertiary);
  transition: background .15s;
}
.modal-close:hover { background: var(--border-light); }
.modal-body { padding: 24px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 12px;
}

/* ══════════════════════════════════════════
   TOAST / SNACKBAR
   ══════════════════════════════════════════ */
.toast-container {
  position: fixed; bottom: 24px; right: 24px;
  z-index: 200; display: flex; flex-direction: column; gap: 8px;
}
.toast {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 20px;
  font-size: 14px; color: var(--text-primary);
  box-shadow: 0 4px 16px rgba(0,0,0,.1);
  display: flex; align-items: center; gap: 10px;
  animation: toast-in .3s ease forwards;
  min-width: 280px;
}
.toast.toast-out { animation: toast-out .25s ease forwards; }
@keyframes toast-in { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
@keyframes toast-out { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(40px); } }

/* ══════════════════════════════════════════
   OFFLINE BANNER
   ══════════════════════════════════════════ */
.offline-banner {
  position: fixed; top: 0; left: 0; right: 0;
  background: var(--warning); color: #fff;
  text-align: center; padding: 8px;
  font-size: 13px; font-weight: 600;
  z-index: 999;
}

/* ══════════════════════════════════════════
   BOTTOM NAV (MOBILE)
   ══════════════════════════════════════════ */
.bnav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 64px;
  background: var(--card);
  border-top: 1px solid var(--border);
  z-index: 50;
  align-items: center; justify-content: space-around;
  padding: 0 8px;
}
.bnav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 8px 12px; border-radius: var(--radius-sm);
  color: var(--text-tertiary); font-size: 10px; font-weight: 600;
  font-family: 'Space Grotesk', sans-serif;
  transition: color .15s;
}
.bnav-btn.active { color: var(--primary); }
.bnav-btn .material-symbols-outlined { font-size: 22px; }

/* More menu (mobile) */
.bnav-more-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 60; opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.bnav-more-overlay.active { opacity: 1; pointer-events: auto; }
.bnav-more-sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card);
  border-top-left-radius: var(--radius-lg);
  border-top-right-radius: var(--radius-lg);
  max-height: 70vh; overflow-y: auto;
  padding: 20px 16px 32px;
  transform: translateY(100%);
  transition: transform .3s ease;
  z-index: 61;
}
.bnav-more-overlay.active .bnav-more-sheet { transform: translateY(0); }
.bnav-more-sheet .nav-btn {
  margin: 2px 0; padding: 12px 16px;
  color: var(--text-primary); font-size: 15px;
}
.bnav-more-sheet .nav-btn .material-symbols-outlined { font-size: 22px; color: var(--text-secondary); }

/* ══════════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════════ */
@media (max-width: 1024px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main-area { margin-left: 0; }
  .bnav { display: flex; }
  .content { padding: 16px; padding-bottom: 80px; }
  .header { padding: 0 16px; }
  .header-search { display: none; }
  .header-user-info { display: none; }
  .kpi-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
  .kpi-value { font-size: 24px; }
  .kpi-card { padding: 16px; }
  .edr-table { font-size: 13px; }
  .edr-table th, .edr-table td { padding: 10px 12px; }
}

@media (max-width: 480px) {
  .kpi-grid { grid-template-columns: 1fr; }
}

/* Sidebar overlay mobile */
.sidebar-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 49;
}
@media (max-width: 768px) {
  .sidebar.open ~ .sidebar-overlay { display: block; }
}

/* ══════════════════════════════════════════
   UTILITY
   ══════════════════════════════════════════ */
.hidden { display: none !important; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.gap-grid { display: grid; gap: 24px; }
.cols-5-2 { grid-template-columns: 3fr 2fr; }
@media (max-width: 1024px) { .cols-5-2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<!-- ═══════ TELA DE LOGIN ═══════ -->
<div id="login-screen" style="display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); padding:20px;">
  <div style="width:100%; max-width:400px; background:var(--card-bg, #fff); border-radius:16px; padding:40px 32px; box-shadow:0 8px 32px rgba(0,0,0,.08);">
    <div style="text-align:center; margin-bottom:32px;">
      <h1 style="font-family:'Plus Jakarta Sans',sans-serif; font-size:28px; font-weight:800; color:#2D6A4F;">EDR System</h1>
      <span style="display:inline-block; background:#2D6A4F; color:#fff; font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px; margin-top:4px;">V2</span>
      <p style="color:var(--text-secondary, #666); font-size:13px; margin-top:12px;">Gestão inteligente de obras</p>
    </div>
    <div style="display:grid; gap:14px;">
      <div>
        <label style="font-size:12px; font-weight:600; color:var(--text-secondary, #666); display:block; margin-bottom:6px;">Email</label>
        <input id="login-user" type="email" placeholder="seu@email.com" style="width:100%; padding:12px 14px; border:1px solid var(--border, #e0e0e0); border-radius:10px; font-size:14px; background:var(--bg, #fff); color:var(--text-primary, #111); outline:none; transition:border .2s;" onfocus="this.style.borderColor='#2D6A4F'" onblur="this.style.borderColor=''">
      </div>
      <div>
        <label style="font-size:12px; font-weight:600; color:var(--text-secondary, #666); display:block; margin-bottom:6px;">Senha</label>
        <input id="login-pass" type="password" placeholder="••••••••" style="width:100%; padding:12px 14px; border:1px solid var(--border, #e0e0e0); border-radius:10px; font-size:14px; background:var(--bg, #fff); color:var(--text-primary, #111); outline:none; transition:border .2s;" onfocus="this.style.borderColor='#2D6A4F'" onblur="this.style.borderColor=''" onkeydown="if(event.key==='Enter')fazerLogin()">
      </div>
      <p id="login-error" style="color:#dc2626; font-size:13px; min-height:18px;"></p>

<!-- ═══════ JAVASCRIPT ═══════ -->
<script>
// ══════════════════════════════════════════
// EDR SYSTEM V2 — NAVEGACAO + SHELL
// ══════════════════════════════════════════

// ── VIEW TITLES ───────────────────────────
const VIEW_TITLES = {
  dashboard: 'Painel', relatorio: 'Relatorio P&L', caixa: 'Fluxo de Caixa',
  obras: 'Obras', custos: 'Custos', garantias: 'Garantias',
  estoque: 'Estoque', catalogo: 'Catalogo', notas: 'Notas Fiscais', form: 'Nova Nota Fiscal',
  'contas-pagar': 'Contas a Pagar', creditos: 'Creditos',
  diarias: 'Diarias', leads: 'Leads / CRM',
  banco: 'Banco', permissoes: 'Permissoes', setup: 'Configuracao',
  cronograma: 'Cronograma', orcamento: 'Orcamento', usuarios: 'Usuarios',
  importar: 'Importar XML', adicionais: 'Adicionais',
  diario: 'Diario de Obra', pci: 'PCI Medicoes',
  termo: 'Termo de Entrega', manual: 'Manual do Sistema'
};

// ── VIEW REGISTRY (lazy loading) ──────────
// Cada modulo se registra aqui com: viewRegistry.register('obras', renderObras)
const viewRegistry = {
  _handlers: {},
  register(viewId, fn) { this._handlers[viewId] = fn; },
  invoke(viewId) {
    const fn = this._handlers[viewId];
    if (fn) {
      const container = document.getElementById('view-' + viewId);
      fn(container);
    }
  }
};

// ── PERMISSION MAP ────────────────────────
const PERFIL_VIEWS = {
  admin: null, // null = tudo
  operacional: null, // tudo tambem
  mestre: ['diarias', 'cronograma'],
  visitante: null // tudo, mas readonly (controlado na UI de cada modulo)
};

// ── SIDEBAR ACCORDION ─────────────────────
function toggleSidebarGroup(labelEl) {
  const group = labelEl.nextElementSibling;
  if (!group || !group.classList.contains('sidebar-group')) return;
  const isCollapsed = group.classList.contains('collapsed');
  if (isCollapsed) {
    group.classList.remove('collapsed');
    labelEl.classList.remove('collapsed');
    group.style.maxHeight = group.scrollHeight + 'px';
    setTimeout(() => { group.style.maxHeight = '500px'; }, 260);
  } else {
    group.style.maxHeight = group.scrollHeight + 'px';
    requestAnimationFrame(() => {
      group.classList.add('collapsed');
      labelEl.classList.add('collapsed');
    });
  }
}

function collapseAllGroups() {
  document.querySelectorAll('.sidebar-group').forEach(g => {
    g.classList.add('collapsed');
    g.style.maxHeight = '0px';
    const label = g.previousElementSibling;
    if (label?.classList.contains('sidebar-group-label')) label.classList.add('collapsed');
  });
}

function expandGroupForView(viewId) {
  const btn = document.querySelector(`.sidebar .nav-btn[data-view="${viewId}"]`);
  if (!btn) return;
  const group = btn.closest('.sidebar-group');
  if (!group) return;
  const label = group.previousElementSibling;
  if (group.classList.contains('collapsed')) {
    group.classList.remove('collapsed');
    if (label) label.classList.remove('collapsed');
    group.style.maxHeight = group.scrollHeight + 'px';
    setTimeout(() => { group.style.maxHeight = '500px'; }, 260);
  }
}

function initSidebarGroups() {
  collapseAllGroups();
  const activeView = localStorage.getItem('edr_last_view') || 'dashboard';
  expandGroupForView(activeView);
}

// ── MAIN ROUTING ──────────────────────────
let _currentView = null;

function setView(v) {
  // Permissao: mestre so acessa views permitidas
  if (typeof usuarioAtual !== 'undefined' && usuarioAtual?.perfil) {
    const allowed = PERFIL_VIEWS[usuarioAtual.perfil];
    if (allowed && !allowed.includes(v)) {
      showToast('Acesso negado a esta tela.');
      if (_currentView && allowed.includes(_currentView)) return;
      setView(allowed[0]); // redireciona pra primeira view permitida
      return;
    }
  }

  // Salvar ultima view
  try { localStorage.setItem('edr_last_view', v); } catch(e) {}

  _currentView = v;

  // Trocar views
  document.querySelectorAll('.view').forEach(el => {
    el.classList.toggle('active', el.id === `view-${v}`);
  });

  // Sidebar: highlight ativo
  document.querySelectorAll('.sidebar .nav-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-view') === v);
  });

  // Expandir grupo do sidebar
  expandGroupForView(v);

  // Header title
  const title = VIEW_TITLES[v] || v;
  document.getElementById('header-title').textContent = title;

  // Bottom nav: highlight
  document.querySelectorAll('.bnav-btn[data-view]').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-view') === v);
  });

  // Fechar menus mobile
  closeSidebar();
  closeBnavMore();

  // Lazy load: chamar o handler do modulo
  viewRegistry.invoke(v);
}

// ── MOBILE SIDEBAR ────────────────────────
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').style.display = 'block';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').style.display = 'none';
}

// ── MOBILE BOTTOM NAV "MORE" ──────────────
function openBnavMore() {
  document.getElementById('bnav-more').classList.add('active');
}
function closeBnavMore() {
  document.getElementById('bnav-more').classList.remove('active');
}

// ── DARK MODE TOGGLE ──────────────────────
function toggleTheme() {
  const html = document.documentElement;
  html.classList.toggle('dark');
  const isDark = html.classList.contains('dark');
  document.getElementById('theme-icon').textContent = isDark ? 'light_mode' : 'dark_mode';
  try { localStorage.setItem('edr-theme', isDark ? 'dark' : 'light'); } catch(e) {}
}

// Restore saved theme
(function() {
  const saved = localStorage.getItem('edr-theme');
  if (saved === 'dark') {
    document.documentElement.classList.add('dark');
    const icon = document.getElementById('theme-icon');
    if (icon) icon.textContent = 'light_mode';
  }
})();

// ── MODAL SYSTEM ──────────────────────────
function openModal(id) {
  const el = document.getElementById(`modal-${id}`);
  if (el) el.classList.add('active');
}
function closeModal(id) {
  const el = document.getElementById(`modal-${id}`);
  if (el) el.classList.remove('active');
}

// ESC fecha modal ou sidebar
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  // Modais
  const modais = document.querySelectorAll('.modal-overlay.active');
  if (modais.length) {
    modais.forEach(m => { const id = m.id.replace('modal-', ''); closeModal(id); });
    e.preventDefault();
    return;
  }
  // Sidebar mobile
  if (document.getElementById('sidebar').classList.contains('open')) {
    closeSidebar();
    e.preventDefault();
  }
  // Bottom nav more
  if (document.getElementById('bnav-more').classList.contains('active')) {
    closeBnavMore();
    e.preventDefault();
  }
});

// ── TOAST SYSTEM ──────────────────────────
function showToast(msg, duration = 3500) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('toast-out');
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

// ── OFFLINE DETECTION ─────────────────────
function _showOfflineBanner(offline) {
  let banner = document.getElementById('offline-banner');
  if (offline && !banner) {
    banner = document.createElement('div');
    banner.id = 'offline-banner';
    banner.className = 'offline-banner';
    banner.textContent = 'SEM CONEXAO — as alteracoes nao serao salvas ate a internet voltar.';
    document.body.prepend(banner);
  } else if (!offline && banner) {
    banner.remove();
    showToast('Conexao restabelecida.');
  }
}
window.addEventListener('offline', () => _showOfflineBanner(true));
window.addEventListener('online', () => _showOfflineBanner(false));

// ── RESPONSIVE: show/hide hamburger ───────
function _checkResponsive() {
  const isMobile = window.innerWidth <= 768;
  document.getElementById('hamburger-btn').style.display = isMobile ? 'flex' : 'none';
}
window.addEventListener('resize', _checkResponsive);

// ── SERVICE WORKER ─────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

// ── INIT ──────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  _checkResponsive();
  initSidebarGroups();

  // Restore last view
  const lastView = localStorage.getItem('edr_last_view');
  if (lastView && document.getElementById(`view-${lastView}`)) {
    setView(lastView);
  }

  // Demo: apply permission filter to sidebar
  _applyPermissionFilter();
});

// Hide sidebar items user cant access
function _applyPermissionFilter() {
  if (typeof usuarioAtual === 'undefined' || !usuarioAtual?.perfil) return;
  const allowed = PERFIL_VIEWS[usuarioAtual.perfil];
  if (!allowed) return; // null = full access
  document.querySelectorAll('.nav-btn[data-view]').forEach(btn => {
    const v = btn.getAttribute('data-view');
    if (!allowed.includes(v)) btn.style.display = 'none';
  });
}

// ── PLACEHOLDER: user info ────────────────
// Will be called by auth module after login
function updateShellUser(nome, perfil) {
  document.getElementById('header-user-name').textContent = nome || '—';
  document.getElementById('header-user-role').textContent = perfil || '—';
  document.getElementById('sidebar-user-name').textContent = nome || '—';
  const initials = (nome || '—').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  document.getElementById('header-avatar').textContent = initials;
}
</script>
