<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Elyda — EDR Engenharia</title>
<style>
  :root {
    --bg: #f0f2f5; --bg-card: #fff; --bg-item: #f9fafb; --bg-item-hover: #f3f4f6;
    --text: #1a1a2e; --text-sec: #374151; --text-muted: #9ca3af; --text-obs: #6b7280;
    --border: #e5e7eb; --accent: #059669; --accent2: #10b981;
    --accent-light: rgba(16,185,129,.15);
    --input-bg: #fff; --shadow: rgba(0,0,0,.06);
    --hoje-bg: #ecfdf5; --hoje-border: #10b981;
    --sel-bg: #f0fdf4; --done-bg: #f0fdf4; --done-text: #6b7280;
  }
  [data-theme="dark"] {
    --bg: #0f1117; --bg-card: #1a1d27; --bg-item: #232733; --bg-item-hover: #2a2e3d;
    --text: #e4e6eb; --text-sec: #c9cdd5; --text-muted: #8b95a5; --text-obs: #9ba3b5;
    --border: #2d3140; --accent: #34d399; --accent2: #6ee7b7;
    --accent-light: rgba(52,211,153,.15);
    --input-bg: #232733; --shadow: rgba(0,0,0,.3);
    --hoje-bg: #0d2818; --hoje-border: #10b981;
    --sel-bg: #122620; --done-bg: #1a2420; --done-text: #6b7280;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}

  /* ── HEADER ── */
  .header{background:linear-gradient(135deg,#004704,#006608);color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  [data-theme="dark"] .header{background:linear-gradient(135deg,#071a09,#0d2f10)}
  .header-left{display:flex;align-items:center;gap:12px}
  .header-logo{height:36px;width:auto}
  .header-title h1{font-size:1.1rem;font-weight:700;line-height:1.2}
  .header-title .sub{font-size:.75rem;opacity:.7;letter-spacing:1px;text-transform:uppercase}
  .header-right{display:flex;align-items:center;gap:8px}
  .hbtn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.85rem;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;transition:background .2s}
  .hbtn:hover{background:rgba(255,255,255,.22)}
  .contadores{display:flex;gap:16px}
  .contador{text-align:center}
  .contador .num{font-size:1.2rem;font-weight:700}
  .contador .lbl{font-size:.7rem;opacity:.8;text-transform:uppercase;letter-spacing:.5px}

  /* ── DESKTOP: calendario + painel ── */
  .desktop-view{display:grid;grid-template-columns:1fr 400px;gap:20px;padding:20px 24px;max-width:1440px;margin:0 auto;height:calc(100vh - 62px)}
  .calendario{background:var(--bg-card);border-radius:14px;padding:18px;box-shadow:0 1px 8px var(--shadow);display:flex;flex-direction:column}
  .mes-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .mes-nav h2{font-size:1.2rem;font-weight:600;color:var(--text-sec);text-transform:capitalize}
  .mes-nav button{background:var(--bg-card);border:1px solid var(--border);width:44px;height:44px;border-radius:8px;cursor:pointer;font-size:1rem;color:var(--accent);display:flex;align-items:center;justify-content:center;transition:all .2s}
  .mes-nav button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
  .dias-semana{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;font-size:.78rem;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase}
  .dias-semana span{text-align:center;padding:4px 6px;border:2px solid transparent}
  .grid-dias{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;flex:1}
  .dia{border-radius:8px;padding:5px 6px;min-height:76px;cursor:pointer;transition:all .15s;border:2px solid transparent;text-align:center;overflow:hidden;min-width:0}
  .dia:hover{background:var(--accent-light);border-color:var(--accent)}
  .dia.hoje{background:var(--hoje-bg);border-color:var(--hoje-border)}
  .dia.sel{background:var(--sel-bg);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
  .dia.out{opacity:.25}
  .dia .num{font-size:.8rem;font-weight:600;color:var(--text-sec);margin-bottom:2px}
  .dia.hoje .num{background:var(--accent);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem}
  .dia .evs{display:flex;flex-direction:column;gap:1px;min-width:0;overflow:hidden}
  .ev-mini{font-size:.7rem;padding:2px 4px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;text-align:left;max-width:100%;display:block}
  .ev-mini.done{opacity:.4;text-decoration:line-through}
  .ev-mini.pessoal{background:#dbeafe;color:#1e40af}
  .ev-mini.trabalho{background:#fef3c7;color:#92400e}
  .ev-mini.compra{background:#fce7f3;color:#9d174d}
  .ev-mini.lembrete{background:#e0e7ff;color:#3730a3}
  [data-theme="dark"] .ev-mini.pessoal{background:#1e3a5f;color:#93c5fd}
  [data-theme="dark"] .ev-mini.trabalho{background:#422006;color:#fcd34d}
  [data-theme="dark"] .ev-mini.compra{background:#500724;color:#f9a8d4}
  [data-theme="dark"] .ev-mini.lembrete{background:#312e81;color:#a5b4fc}
  .ev-mini.p-alta{border-left:2px solid #ef4444}
  .ev-mini.p-media{border-left:2px solid #f59e0b}
  .dia .mais{font-size:.7rem;color:var(--accent);font-weight:600}

  .painel-lat{display:flex;flex-direction:column;gap:14px;overflow-y:auto}
  .card{background:var(--bg-card);border-radius:14px;padding:16px;box-shadow:0 1px 8px var(--shadow)}
  .card h3{font-size:.95rem;font-weight:600;color:var(--text-sec);margin-bottom:10px;display:flex;align-items:center;gap:8px}

  /* ── MOBILE: vista lista ── */
  .mobile-view{display:none;padding:0;min-height:calc(100vh - 62px)}

  .mob-tabs{display:flex;background:var(--bg-card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
  .mob-tab{flex:1;padding:14px 8px;text-align:center;font-size:.9rem;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
  .mob-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

  .mob-daynav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg-card);border-bottom:1px solid var(--border)}
  .mob-daynav button{background:none;border:none;color:var(--accent);font-size:1.4rem;cursor:pointer;padding:8px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
  .mob-daynav .dia-label{text-align:center}
  .mob-daynav .dia-label .dia-nome{font-size:1rem;font-weight:700;color:var(--text)}
  .mob-daynav .dia-label .dia-data{font-size:.82rem;color:var(--text-muted)}

  .mob-lista{padding:12px 16px;display:flex;flex-direction:column;gap:8px;padding-bottom:90px}
  .mob-vazio{text-align:center;color:var(--text-muted);padding:40px 20px;font-size:.95rem}

  /* Evento item (compartilhado desktop/mobile) */
  .ev-item{display:flex;align-items:flex-start;gap:10px;padding:12px;border-radius:12px;background:var(--bg-item);transition:all .2s}
  .ev-item:hover{background:var(--bg-item-hover)}
  .ev-item.done{opacity:.55}
  .ev-item.done .ev-titulo{text-decoration:line-through;color:var(--done-text)}
  .ev-item.p-alta{border-left:3px solid #ef4444}
  .ev-item.p-media{border-left:3px solid #f59e0b}
  .ev-check{appearance:none;-webkit-appearance:none;width:28px;height:28px;min-width:28px;border:2px solid var(--border);border-radius:50%;cursor:pointer;transition:all .2s;position:relative;margin-top:2px}
  .ev-check:checked{background:var(--accent);border-color:var(--accent)}
  .ev-check:checked::after{content:'\\2713';color:#fff;font-size:.75rem;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
  .ev-hora{font-size:.82rem;font-weight:600;color:var(--accent);min-width:44px;padding-top:3px}
  .ev-info{flex:1}
  .ev-titulo{font-size:.9rem;font-weight:500;color:var(--text)}
  .ev-obs{font-size:.8rem;color:var(--text-obs);margin-top:2px}
  .ev-meta{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
  .ev-cat{font-size:.75rem;padding:2px 8px;border-radius:20px}
  .ev-cat.pessoal{background:#dbeafe;color:#1e40af}
  .ev-cat.trabalho{background:#fef3c7;color:#92400e}
  .ev-cat.compra{background:#fce7f3;color:#9d174d}
  .ev-cat.lembrete{background:#e0e7ff;color:#3730a3}
  [data-theme="dark"] .ev-cat.pessoal{background:#1e3a5f;color:#93c5fd}
  [data-theme="dark"] .ev-cat.trabalho{background:#422006;color:#fcd34d}
  [data-theme="dark"] .ev-cat.compra{background:#500724;color:#f9a8d4}
  [data-theme="dark"] .ev-cat.lembrete{background:#312e81;color:#a5b4fc}
  .ev-prio{font-size:.72rem;padding:2px 7px;border-radius:20px;font-weight:600}
  .ev-prio.alta{background:#fef2f2;color:#dc2626}
  .ev-prio.media{background:#fffbeb;color:#d97706}
  [data-theme="dark"] .ev-prio.alta{background:#450a0a;color:#fca5a5}
  [data-theme="dark"] .ev-prio.media{background:#451a03;color:#fcd34d}
  .ev-actions{display:flex;flex-direction:column;gap:2px;align-items:center}
  .ev-edit,.ev-del{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;padding:6px;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;opacity:.4;transition:color .2s;border-radius:6px}
  .ev-edit:hover{color:var(--accent);opacity:1;background:var(--accent-light)}
  .ev-del:hover{color:#ef4444;opacity:1}

  /* Form novo (compartilhado) */
  .form-novo{display:flex;flex-direction:column;gap:8px}
  .form-novo input,.form-novo select,.form-novo textarea{padding:12px;border:1.5px solid var(--border);border-radius:10px;font-size:1rem;font-family:inherit;outline:none;background:var(--input-bg);color:var(--text);transition:border-color .2s}
  .form-novo input:focus,.form-novo select:focus,.form-novo textarea:focus{border-color:var(--accent)}
  .form-novo textarea{resize:none;height:64px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .form-row-3{display:grid;grid-template-columns:auto 1fr 1fr;gap:8px}
  .btn-add{background:linear-gradient(135deg,#004704,#059669);color:#fff;border:none;padding:14px;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;transition:opacity .2s;min-height:48px}
  .btn-add:hover{opacity:.9}

  /* FAB mobile */
  .fab{display:none;position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:1.8rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:50;align-items:center;justify-content:center;transition:transform .2s}
  .fab:active{transform:scale(.9)}

  /* Modal mobile novo evento */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
  .modal-overlay.show{display:flex}
  .modal-content{background:var(--bg-card);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .modal-header h3{font-size:1.1rem;font-weight:600;color:var(--text)}
  .modal-close{background:none;border:none;font-size:1.5rem;color:var(--text-muted);cursor:pointer;padding:8px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}

  /* Proximos (desktop) */
  .prox-lista{display:flex;flex-direction:column;gap:4px}
  .prox-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;background:var(--bg-item);font-size:.82rem;cursor:pointer;transition:background .2s}
  .prox-item:hover{background:var(--accent-light)}
  .prox-data{font-weight:600;color:var(--accent);min-width:42px;font-size:.78rem}
  .prox-texto{color:var(--text-sec);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* Sem eventos */
  .vazio{text-align:center;color:var(--text-muted);font-size:.88rem;padding:20px 0}

  /* Sync/loading/offline */
  .saving-ind{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:6px 16px;border-radius:20px;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:8px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none}
  .saving-ind.vis{opacity:1}
  .saving-dot{width:8px;height:8px;background:#fff;border-radius:50%;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .offline-bar{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#dc2626;color:#fff;padding:8px 20px;border-radius:20px;font-size:.82rem;font-weight:600;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.3)}
  .offline-bar.vis{display:block}
  .load-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:12px;transition:opacity .3s}
  .load-overlay.gone{opacity:0;pointer-events:none}
  .load-spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Filtro dropdown */
  .filtro-wrap{position:relative}
  .filtro-dd{display:none;position:absolute;top:48px;right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px;min-width:180px;box-shadow:0 4px 20px var(--shadow);z-index:100}
  .filtro-dd.show{display:block}
  .filtro-dd label{display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;font-size:.85rem;color:var(--text-sec);cursor:pointer}
  .filtro-dd label:hover{background:var(--bg-item)}
  .filtro-dd input[type="checkbox"]{accent-color:var(--accent);width:18px;height:18px}
  .filtro-sec{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;padding:8px 8px 2px;font-weight:600}
  .filtro-div{height:1px;background:var(--border);margin:4px 0}

  /* ── RESPONSIVE ── */
  @media(max-width:768px){
    .desktop-view{display:none!important}
    .mobile-view{display:flex!important;flex-direction:column}
    .fab{display:flex!important}
    .contadores{gap:20px}
    .header{padding:10px 16px;flex-wrap:wrap;gap:6px}
    .header-logo{height:28px}
    .header-title h1{font-size:.95rem}
    .header-title .sub{display:none}
    .contadores{order:3;width:100%;justify-content:center;padding-top:6px;border-top:1px solid rgba(255,255,255,.1)}
    .filtro-dd{right:-20px}
  }
</style>
</head>
<body>

<div class="load-overlay" id="loadO"><div class="load-spin"></div><div style="font-size:.85rem;color:var(--text-muted)">Carregando agenda...</div></div>
<div class="saving-ind" id="saveInd"><div class="saving-dot"></div>sincronizando</div>
<div class="offline-bar" id="offBar">Sem internet — modo offline</div>

        <div class="filtro-div"></div>
        <div class="filtro-sec">Categoria</div>

        <label><input type="checkbox" checked onchange="refresh()" data-f="pessoal"> Pessoal</label>

<!-- ══════ DESKTOP VIEW ══════ -->
<div class="desktop-view" id="deskView">
  <div class="calendario">
    <div class="mes-nav">
      <button onclick="mudarMes(-1)" aria-label="Mes anterior">&#9664;</button>

    <div class="grid-dias" id="gridDias"></div>
  </div>
  <div class="painel-lat">
    <div class="card">
      <h3>&#128203; <span id="tituloDia">Selecione um dia</span></h3>

<!-- ══════ MOBILE VIEW ══════ -->
<div class="mobile-view" id="mobView">
  <div class="mob-tabs">
    <div class="mob-tab active" onclick="setMobTab('hoje')">Hoje</div>
    <div class="mob-tab" onclick="setMobTab('amanha')">Amanha</div>
    <div class="mob-tab" onclick="setMobTab('semana')">Semana</div>
  </div>

  </div>

</div>

<button class="fab" onclick="abrirModal()" aria-label="Novo compromisso">+</button>

<!-- Modal mobile -->
<div class="modal-overlay" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitulo">Novo compromisso</h3>
      <button class="modal-close" onclick="fecharModal();resetModal()" aria-label="Fechar">&#10005;</button>
    </div>
    <div class="form-novo">
      <input type="text" id="mTit" placeholder="O que precisa fazer?" aria-label="Titulo">
      <div class="form-row">
        <input type="time" id="mHora" value="08:00" aria-label="Horario">
        <select id="mCat" aria-label="Categoria"><option value="trabalho">Trabalho</option><option value="pessoal">Pessoal</option><option value="compra">Compra</option><option value="lembrete">Lembrete</option></select>
      </div>
      <select id="mPrio" aria-label="Prioridade"><option value="baixa">Normal</option><option value="media">Media</option><option value="alta">Alta</option></select>
      <textarea id="mObs" placeholder="Observacoes (opcional)" aria-label="Observacoes"></textarea>
      <button class="btn-add" id="modalBtnAdd" onclick="addEvento('m')">Adicionar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── Supabase + cache offline ──
const SU='https://mepzoxoahpwcvvlymlfh.supabase.co',SK='sb_publishable_Z9E8KLU8ZIMcWjD-bMG5gg_eM585qWq';
let db;try{db=window.supabase.createClient(SU,SK)}catch(e){db=null}
const SYNC='elyda-agenda-v1',CACHE='elyda_agenda_cache';
let state=[],mesAt=new Date().getMonth(),anoAt=new Date().getFullYear(),diaSel=null,mobTab='hoje',mobDate=new Date();
let isOff=!navigator.onLine;
window.addEventListener('online',()=>{isOff=false;document.getElementById('offBar').classList.remove('vis');save(state)});
window.addEventListener('offline',()=>{isOff=true;document.getElementById('offBar').classList.add('vis')});

function cache(ev){try{localStorage.setItem(CACHE,JSON.stringify(ev))}catch(e){}}
function fromCache(){try{return JSON.parse(localStorage.getItem(CACHE))||[]}catch{return[]}}

async function save(ev){
  state=ev;cache(ev);
  if(!db||isOff)return;
  const i=document.getElementById('saveInd');i.classList.add('vis');
  try{await db.from('tracker_sync').upsert({key:SYNC,data:{eventos:ev},updated_at:new Date().toISOString()})}catch(e){}
  setTimeout(()=>i.classList.remove('vis'),1200);
}

async function load(){
  if(db&&!isOff){
    try{const{data}=await db.from('tracker_sync').select('data').eq('key',SYNC).single();
    if(data?.data?.eventos){state=data.data.eventos;cache(state);return true}}catch(e){}}
  const c=fromCache();if(c.length){state=c;if(isOff)document.getElementById('offBar').classList.add('vis');return true}
  return false;
}

// ── Helpers ──
function fmt(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function fmtHoje(){const h=new Date();return fmt(h.getFullYear(),h.getMonth(),h.getDate())}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function catNome(c){return{pessoal:'Pessoal',trabalho:'Trabalho',compra:'Compra',lembrete:'Lembrete'}[c]||c}
const DIAS=['Domingo','Segunda','Terca','Quarta','Quinta','Sexta','Sabado'];
const MESES=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function getFiltros(){const f={};document.querySelectorAll('#filtroDD input[type=checkbox]').forEach(c=>f[c.dataset.f]=c.checked);return f}
function filtrar(evs){const f=getFiltros();return evs.filter(e=>{
  if(e.concluido&&!f.done)return false;if(!e.concluido&&!f.pend)return false;
  if(!f[e.prioridade||'baixa'])return false;if(!f[e.categoria])return false;return true})}
function ordenar(evs){return[...evs].sort((a,b)=>{
  if(a.concluido!==b.concluido)return a.concluido?1:-1;
  const p={alta:0,media:1,baixa:2};const pa=p[a.prioridade||'baixa']||2,pb=p[b.prioridade||'baixa']||2;
  if(pa!==pb)return pa-pb;return(a.hora||'').localeCompare(b.hora||'')})}

// ── Render evento HTML (compartilhado) ──
function renderEv(ev){
  const pr=ev.prioridade||'baixa';const pl={alta:'URGENTE',media:'Media',baixa:''};
  return`<div class="ev-item ${ev.concluido?'done':''} p-${pr}">
    <input type="checkbox" class="ev-check" ${ev.concluido?'checked':''} onchange="toggle(${ev.id})" aria-label="Marcar como ${ev.concluido?'pendente':'concluido'}">
    <div class="ev-hora">${ev.hora||'--:--'}</div>
    <div class="ev-info">
      <div class="ev-titulo">${esc(ev.titulo)}</div>
      ${ev.obs?`<div class="ev-obs">${esc(ev.obs)}</div>`:''}
      <div class="ev-meta">
        <span class="ev-cat ${ev.categoria}">${catNome(ev.categoria)}</span>
        ${pr!=='baixa'?`<span class="ev-prio ${pr}">${pl[pr]}</span>`:''}
      </div>
    </div>
    <div class="ev-actions">
      <button class="ev-edit" onclick="editEv(${ev.id})" aria-label="Editar">&#9998;</button>
      <button class="ev-del" onclick="del(${ev.id})" aria-label="Remover">&#10005;</button>
    </div>
  </div>`}

// ── Desktop: calendario ──
function renderCal(){
  const g=document.getElementById('gridDias');g.innerHTML='';
  document.getElementById('tituloMes').textContent=`${MESES[mesAt]} ${anoAt}`;
  const p1=new Date(anoAt,mesAt,1).getDay(),ult=new Date(anoAt,mesAt+1,0).getDate();
  const hoje=new Date(),evs=filtrar(state);
  const prev=new Date(anoAt,mesAt,0).getDate();
  for(let i=p1-1;i>=0;i--)g.appendChild(mkDia(prev-i,true));
  for(let d=1;d<=ult;d++){
    const ds=fmt(anoAt,mesAt,d),de=evs.filter(e=>e.data===ds);
    const eh=hoje.getDate()===d&&hoje.getMonth()===mesAt&&hoje.getFullYear()===anoAt;
    g.appendChild(mkDia(d,false,eh,diaSel===ds,de,ds))}
  const tot=p1+ult,rest=tot%7===0?0:7-tot%7;
  for(let d=1;d<=rest;d++)g.appendChild(mkDia(d,true));
  updContadores();renderProx()}

function mkDia(n,out,hoje,sel,evs,ds){
  const d=document.createElement('div');d.className='dia';
  if(out)d.classList.add('out');if(hoje)d.classList.add('hoje');if(sel)d.classList.add('sel');
  const nm=document.createElement('div');nm.className='num';nm.textContent=n;d.appendChild(nm);
  if(evs&&evs.length){const ev=document.createElement('div');ev.className='evs';
    const sorted=ordenar(evs);sorted.slice(0,3).forEach(e=>{
      const s=document.createElement('div');s.className=`ev-mini ${e.categoria} p-${e.prioridade||'baixa'}`;
      if(e.concluido)s.classList.add('done');s.textContent=e.hora?`${e.hora} ${e.titulo}`:e.titulo;ev.appendChild(s)});
    if(evs.length>3){const m=document.createElement('div');m.className='mais';m.textContent=`+${evs.length-3}`;ev.appendChild(m)}
    d.appendChild(ev)}
  if(ds)d.onclick=()=>{diaSel=ds;renderCal();renderDia()};return d}

function renderDia(){
  const c=document.getElementById('eventosDia'),t=document.getElementById('tituloDia');
  if(!diaSel){c.innerHTML='<div class="vazio">Clique em um dia</div>';t.textContent='Selecione um dia';return}
  const[a,m,d]=diaSel.split('-');const dt=new Date(+a,+m-1,+d);
  t.textContent=`${DIAS[dt.getDay()]}, ${d}/${m}`;
  let evs=ordenar(filtrar(state.filter(e=>e.data===diaSel)));
  c.innerHTML=evs.length?evs.map(renderEv).join(''):'<div class="vazio">Nenhum compromisso</div>'}

function renderProx(){
  const c=document.getElementById('proxLista'),h=fmtHoje();
  const prox=state.filter(e=>e.data>=h&&!e.concluido).sort((a,b)=>a.data.localeCompare(b.data)||(a.hora||'').localeCompare(b.hora||'')).slice(0,8);
  if(!prox.length){c.innerHTML='<div class="vazio">Tudo em dia!</div>';return}
  c.innerHTML=prox.map(e=>{const[a,m,d]=e.data.split('-');return`<div class="prox-item p-${e.prioridade||'baixa'}" onclick="diaSel='${e.data}';renderCal();renderDia()">
    <div class="prox-data">${d}/${m}</div><div class="prox-texto">${e.hora?e.hora+' — ':''}${esc(e.titulo)}</div>
    <span class="ev-cat ${e.categoria}" style="font-size:.72rem">${catNome(e.categoria)}</span></div>`}).join('')}

// ── Mobile: lista ──
function setMobTab(tab){
  mobTab=tab;document.querySelectorAll('.mob-tab').forEach((t,i)=>{t.classList.toggle('active',['hoje','amanha','semana'][i]===tab)});
  document.getElementById('mobDayNav').style.display='none';
  if(tab==='hoje')mobDate=new Date();
  else if(tab==='amanha'){mobDate=new Date();mobDate.setDate(mobDate.getDate()+1)}
  renderMob()}

function mobDia(delta){mobDate.setDate(mobDate.getDate()+delta);renderMob()}

function renderMob(){
  const c=document.getElementById('mobLista'),nav=document.getElementById('mobDayNav');
  const h=fmtHoje();let evs;
  if(mobTab==='semana'){
    nav.style.display='none';
    const d7=new Date();d7.setDate(d7.getDate()+7);const s7=fmt(d7.getFullYear(),d7.getMonth(),d7.getDate());
    evs=state.filter(e=>e.data>=h&&e.data<=s7);
    evs=ordenar(filtrar(evs)).sort((a,b)=>a.data.localeCompare(b.data)||(a.hora||'').localeCompare(b.hora||''));
    if(!evs.length){c.innerHTML='<div class="mob-vazio">Semana livre!</div>';return}
    let html='',lastDate='';
    evs.forEach(e=>{if(e.data!==lastDate){lastDate=e.data;const[a,m,d]=e.data.split('-');const dt=new Date(+a,+m-1,+d);
      html+=`<div style="font-size:.82rem;font-weight:600;color:var(--accent);padding:8px 0 4px">${DIAS[dt.getDay()]} ${d}/${m}</div>`}
      html+=renderEv(e)});c.innerHTML=html;
  } else {
    nav.style.display='flex';
    const ds=fmt(mobDate.getFullYear(),mobDate.getMonth(),mobDate.getDate());
    document.getElementById('mobDiaNome').textContent=DIAS[mobDate.getDay()];
    const dd=String(mobDate.getDate()).padStart(2,'0'),mm=String(mobDate.getMonth()+1).padStart(2,'0');
    document.getElementById('mobDiaData').textContent=`${dd}/${mm}/${mobDate.getFullYear()}`;
    const isHoje=ds===h;
    if(isHoje)document.getElementById('mobDiaNome').textContent='Hoje';
    evs=ordenar(filtrar(state.filter(e=>e.data===ds)));
    c.innerHTML=evs.length?evs.map(renderEv).join(''):`<div class="mob-vazio">${isHoje?'Nada pra hoje!':'Dia livre'}</div>`;
    // Atualizar diaSel pro form desktop sync
    diaSel=ds;
  }
}

// ── Acoes ──
async function toggle(id){const ev=state.find(e=>e.id===id);if(ev)ev.concluido=!ev.concluido;refresh();await save(state)}
async function del(id){state=state.filter(e=>e.id!==id);refresh();await save(state)}

let editandoId=null;
function editEv(id){
  const ev=state.find(e=>e.id===id);if(!ev)return;
  editandoId=id;
  // Preencher modal mobile com dados do evento
  document.getElementById('mTit').value=ev.titulo;
  document.getElementById('mHora').value=ev.hora||'08:00';
  document.getElementById('mCat').value=ev.categoria;
  document.getElementById('mPrio').value=ev.prioridade||'baixa';
  document.getElementById('mObs').value=ev.obs||'';
  document.getElementById('modalTitulo').textContent='Editar compromisso';
  document.getElementById('modalBtnAdd').textContent='Salvar';
  document.getElementById('modalBtnAdd').onclick=()=>salvarEdicao();
  document.getElementById('modal').classList.add('show');
}

async function salvarEdicao(){
  const ev=state.find(e=>e.id===editandoId);if(!ev)return;
  const t=document.getElementById('mTit').value.trim();if(!t){document.getElementById('mTit').focus();return}
  ev.titulo=t;
  ev.hora=document.getElementById('mHora').value;
  ev.categoria=document.getElementById('mCat').value;
  ev.prioridade=document.getElementById('mPrio').value;
  ev.obs=document.getElementById('mObs').value.trim();
  editandoId=null;
  fecharModal();resetModal();
  refresh();await save(state);
}

function resetModal(){
  document.getElementById('mTit').value='';document.getElementById('mObs').value='';
  document.getElementById('mHora').value='08:00';document.getElementById('mCat').value='trabalho';
  document.getElementById('mPrio').value='baixa';
  document.getElementById('modalTitulo').textContent='Novo compromisso';
  document.getElementById('modalBtnAdd').textContent='Adicionar';
  document.getElementById('modalBtnAdd').onclick=()=>addEvento('m');
  editandoId=null;
}

async function addEvento(src){
  const t=document.getElementById(src+'Tit'),h=document.getElementById(src+'Hora'),
    cat=document.getElementById(src+'Cat'),pr=document.getElementById(src+'Prio'),
    obs=document.getElementById(src+'Obs');
  if(!t.value.trim()){t.focus();return}
  // No mobile, usar a data do mobDate. No desktop, usar diaSel
  let data;
  if(src==='m'){data=fmt(mobDate.getFullYear(),mobDate.getMonth(),mobDate.getDate())}
  else{if(!diaSel){alert('Selecione um dia!');return}data=diaSel}
  state.push({id:Date.now(),data,titulo:t.value.trim(),hora:h.value,categoria:cat.value,prioridade:pr.value,obs:obs.value.trim(),concluido:false});
  t.value='';obs.value='';
  if(src==='m')fecharModal();
  refresh();await save(state)}

function refresh(){renderCal();renderDia();renderMob();updContadores()}

function updContadores(){
  const h=fmtHoje(),p=state.filter(e=>!e.concluido);
  document.getElementById('cHoje').textContent=p.filter(e=>e.data===h).length;
  const d7=new Date();d7.setDate(d7.getDate()+7);const s7=fmt(d7.getFullYear(),d7.getMonth(),d7.getDate());
  document.getElementById('cSem').textContent=p.filter(e=>e.data>=h&&e.data<=s7).length;
  document.getElementById('cMes').textContent=p.filter(e=>{const[a,m]=e.data.split('-');return+a===anoAt&&+m===mesAt+1}).length}

// ── Nav ──
function mudarMes(d){mesAt+=d;if(mesAt>11){mesAt=0;anoAt++}if(mesAt<0){mesAt=11;anoAt--}renderCal()}
function irHoje(){const h=new Date();mesAt=h.getMonth();anoAt=h.getFullYear();diaSel=fmtHoje();mobDate=new Date();mobTab='hoje';
  document.querySelectorAll('.mob-tab').forEach((t,i)=>t.classList.toggle('active',i===0));refresh();renderDia()}

// ── Modal mobile ──
function abrirModal(){document.getElementById('modal').classList.add('show')}
function fecharModal(){document.getElementById('modal').classList.remove('show')}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.classList.contains('modal-overlay')){fecharModal();resetModal()}});

// ── Tema ──
function toggleTema(){const a=document.documentElement.getAttribute('data-theme'),n=a==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',n);localStorage.setItem('elyda_tema',n);
  document.getElementById('temaBtn').innerHTML=n==='dark'?'&#9788;':'&#9790;'}
function loadTema(){const s=localStorage.getItem('elyda_tema')||'dark';document.documentElement.setAttribute('data-theme',s);
  document.getElementById('temaBtn').innerHTML=s==='dark'?'&#9788;':'&#9790;'}

// ── Filtro ──
function toggleFiltro(){document.getElementById('filtroDD').classList.toggle('show')}
document.addEventListener('click',e=>{if(!e.target.closest('.filtro-wrap'))document.getElementById('filtroDD').classList.remove('show')});

// ── Seed ──
function seed(){const h=new Date(),y=h.getFullYear(),m=h.getMonth(),d=h.getDate();
  const ex=[
    {data:fmt(y,m,d),titulo:'Consulta pediatra — Joao',hora:'09:00',categoria:'pessoal',prioridade:'alta',obs:'Levar cartao do SUS',concluido:false},
    {data:fmt(y,m,d),titulo:'Visita obra Junior',hora:'14:00',categoria:'trabalho',prioridade:'alta',obs:'Conferir fundacao',concluido:false},
    {data:fmt(y,m,d),titulo:'Comprar cimento (30 sacos)',hora:'16:00',categoria:'compra',prioridade:'media',obs:'Deposito Silva',concluido:true},
    {data:fmt(y,m,d+1),titulo:'Reuniao cliente Dayana',hora:'10:00',categoria:'trabalho',prioridade:'alta',obs:'Apresentar orcamento',concluido:false},
    {data:fmt(y,m,d+1),titulo:'Buscar meninos na escola',hora:'17:30',categoria:'pessoal',prioridade:'baixa',obs:'',concluido:false},
    {data:fmt(y,m,d+2),titulo:'Entrega de laudo — Pedro',hora:'08:00',categoria:'trabalho',prioridade:'alta',obs:'Imprimir 2 vias',concluido:false},
    {data:fmt(y,m,d+2),titulo:'Comprar vergalhao',hora:'11:00',categoria:'compra',prioridade:'media',obs:'3/8 e 5/16',concluido:false},
    {data:fmt(y,m,d+3),titulo:'Dentista Elyda',hora:'14:30',categoria:'pessoal',prioridade:'baixa',obs:'',concluido:false},
    {data:fmt(y,m,d+4),titulo:'Pagar CREA',hora:'08:00',categoria:'lembrete',prioridade:'alta',obs:'Vence dia 30',concluido:false},
    {data:fmt(y,m,d+5),titulo:'Visita obra Leonardo',hora:'09:00',categoria:'trabalho',prioridade:'media',obs:'Medir laje',concluido:false},
    {data:fmt(y,m,d+7),titulo:'Vacina meninos',hora:'10:00',categoria:'pessoal',prioridade:'media',obs:'',concluido:false}];
  ex.forEach(e=>e.id=Date.now()+Math.random()*10000);return ex}

// ── Keyboard ──
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target.id==='dTit')addEvento('d');if(e.key==='Enter'&&e.target.id==='mTit')addEvento('m')});

// ── Init ──
async function init(){
  loadTema();
  const ok=await load();
  if(!ok||!state.length){state=seed();await save(state)}
  diaSel=fmtHoje();irHoje();
  const o=document.getElementById('loadO');o.classList.add('gone');setTimeout(()=>o.remove(),300)}
init();
</script>
