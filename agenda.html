<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Elyda — EDR Engenharia</title>
<style>
  :root {
    --bg: #f0f2f5;
    --bg-card: #ffffff;
    --bg-item: #f9fafb;
    --bg-item-hover: #f3f4f6;
    --text: #1a1a2e;
    --text-secondary: #374151;
    --text-muted: #9ca3af;
    --text-obs: #6b7280;
    --border: #e5e7eb;
    --hover-dia: #f5f3ff;
    --hover-dia-border: #c4b5fd;
    --hoje-bg: #ecfdf5;
    --hoje-border: #10b981;
    --selecionado-bg: #f0fdf4;
    --accent: #059669;
    --accent2: #10b981;
    --accent-light: rgba(16,185,129,.15);
    --input-bg: #ffffff;
    --shadow: rgba(0,0,0,.06);
    --header-shadow: rgba(0,71,4,.3);
    --done-bg: #f0fdf4;
    --done-text: #6b7280;
  }

  [data-theme="dark"] {
    --bg: #0f1117;
    --bg-card: #1a1d27;
    --bg-item: #232733;
    --bg-item-hover: #2a2e3d;
    --text: #e4e6eb;
    --text-secondary: #c9cdd5;
    --text-muted: #6b7280;
    --text-obs: #8b8fa3;
    --border: #2d3140;
    --hover-dia: #1a2420;
    --hover-dia-border: #059669;
    --hoje-bg: #0d2818;
    --hoje-border: #10b981;
    --selecionado-bg: #122620;
    --accent: #34d399;
    --accent2: #6ee7b7;
    --accent-light: rgba(52,211,153,.15);
    --input-bg: #232733;
    --shadow: rgba(0,0,0,.3);
    --header-shadow: rgba(0,0,0,.5);
    --done-bg: #1a2420;
    --done-text: #6b7280;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background .3s, color .3s;
  }

  .header {
    background: linear-gradient(135deg, #004704, #006608);
    color: white;
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px var(--header-shadow);
  }

  [data-theme="dark"] .header {
    background: linear-gradient(135deg, #071a09, #0d2f10);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-logo { height: 42px; width: auto; }

  .header-title { display: flex; flex-direction: column; }

  .header-title h1 {
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.2;
  }

  .header-title .subtitle {
    font-size: .65rem;
    opacity: .7;
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header .hoje-btn, .theme-toggle, .filtro-btn {
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.25);
    color: white;
    padding: 7px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: .8rem;
    transition: background .2s;
  }

  .theme-toggle, .filtro-btn {
    width: 36px;
    height: 36px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
  }

  .header .hoje-btn:hover, .theme-toggle:hover, .filtro-btn:hover {
    background: rgba(255,255,255,.22);
  }

  .filtro-btn.active {
    background: rgba(255,255,255,.3);
    border-color: rgba(255,255,255,.5);
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 400px;
    gap: 20px;
    padding: 20px 28px;
    max-width: 1440px;
    margin: 0 auto;
    height: calc(100vh - 70px);
  }

  /* ── Nav mes ── */
  .mes-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .mes-nav h2 {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: capitalize;
  }

  .mes-nav button {
    background: var(--bg-card);
    border: 1px solid var(--border);
    width: 34px;
    height: 34px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
  }

  .mes-nav button:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  /* ── Calendario ── */
  .calendario {
    background: var(--bg-card);
    border-radius: 14px;
    padding: 18px;
    box-shadow: 0 1px 8px var(--shadow);
    display: flex;
    flex-direction: column;
    transition: background .3s;
  }

  .dias-semana {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: .75rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  .grid-dias {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    flex: 1;
  }

  .dia {
    border-radius: 8px;
    padding: 5px 6px;
    min-height: 76px;
    cursor: pointer;
    transition: all .15s;
    border: 2px solid transparent;
    position: relative;
  }

  .dia:hover { background: var(--hover-dia); border-color: var(--hover-dia-border); }

  .dia.hoje {
    background: var(--hoje-bg);
    border-color: var(--hoje-border);
  }

  .dia.selecionado {
    background: var(--selecionado-bg);
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .dia.outro-mes { opacity: .25; }

  .dia .numero {
    font-size: .8rem;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 3px;
  }

  .dia.hoje .numero {
    background: var(--accent);
    color: white;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .75rem;
  }

  .dia .eventos { display: flex; flex-direction: column; gap: 1px; }

  .dia .evento-mini {
    font-size: .6rem;
    padding: 1px 4px;
    border-radius: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
  }

  .dia .evento-mini.concluido {
    opacity: .4;
    text-decoration: line-through;
  }

  /* Cores por categoria */
  .evento-mini.pessoal, .evento-cat.pessoal { background: #dbeafe; color: #1e40af; }
  .evento-mini.trabalho, .evento-cat.trabalho { background: #fef3c7; color: #92400e; }
  .evento-mini.compra, .evento-cat.compra { background: #fce7f3; color: #9d174d; }
  .evento-mini.lembrete, .evento-cat.lembrete { background: #e0e7ff; color: #3730a3; }

  [data-theme="dark"] .evento-mini.pessoal, [data-theme="dark"] .evento-cat.pessoal { background: #1e3a5f; color: #93c5fd; }
  [data-theme="dark"] .evento-mini.trabalho, [data-theme="dark"] .evento-cat.trabalho { background: #422006; color: #fcd34d; }
  [data-theme="dark"] .evento-mini.compra, [data-theme="dark"] .evento-cat.compra { background: #500724; color: #f9a8d4; }
  [data-theme="dark"] .evento-mini.lembrete, [data-theme="dark"] .evento-cat.lembrete { background: #312e81; color: #a5b4fc; }

  /* Prioridade — borda esquerda */
  .prio-alta { border-left: 3px solid #ef4444 !important; }
  .prio-media { border-left: 3px solid #f59e0b !important; }
  .prio-baixa { border-left: 3px solid #6b7280 !important; }

  /* Mini dot de prioridade no calendario */
  .dia .evento-mini.prio-dot-alta { border-left: 2px solid #ef4444; }
  .dia .evento-mini.prio-dot-media { border-left: 2px solid #f59e0b; }
  .dia .evento-mini.prio-dot-baixa { border-left: 2px solid transparent; }

  .dia .mais {
    font-size: .55rem;
    color: var(--accent);
    font-weight: 600;
    margin-top: 1px;
  }

  /* ── Painel lateral ── */
  .painel-lateral {
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
  }

  .card {
    background: var(--bg-card);
    border-radius: 14px;
    padding: 16px;
    box-shadow: 0 1px 8px var(--shadow);
    transition: background .3s;
  }

  .card h3 {
    font-size: .95rem;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card h3 .icon { font-size: 1.1rem; }

  .eventos-dia { display: flex; flex-direction: column; gap: 6px; }

  .evento-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 9px 10px;
    border-radius: 10px;
    background: var(--bg-item);
    transition: all .2s;
  }

  .evento-item:hover { background: var(--bg-item-hover); }

  .evento-item.done {
    background: var(--done-bg);
    opacity: .6;
  }

  .evento-item.done .evento-titulo {
    text-decoration: line-through;
    color: var(--done-text);
  }

  .evento-check {
    appearance: none;
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    min-width: 20px;
    border: 2px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    margin-top: 2px;
    transition: all .2s;
    position: relative;
  }

  .evento-check:checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .evento-check:checked::after {
    content: '\\2713';
    color: white;
    font-size: .7rem;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .evento-hora {
    font-size: .7rem;
    font-weight: 600;
    color: var(--accent);
    min-width: 40px;
    padding-top: 3px;
  }

  .evento-info { flex: 1; }

  .evento-titulo {
    font-size: .82rem;
    font-weight: 500;
    color: var(--text);
  }

  .evento-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 3px;
    flex-wrap: wrap;
  }

  .evento-cat {
    font-size: .65rem;
    padding: 1px 7px;
    border-radius: 20px;
    display: inline-block;
  }

  .evento-prio {
    font-size: .6rem;
    padding: 1px 6px;
    border-radius: 20px;
    font-weight: 600;
  }

  .evento-prio.alta { background: #fef2f2; color: #dc2626; }
  .evento-prio.media { background: #fffbeb; color: #d97706; }
  .evento-prio.baixa { background: var(--bg-item); color: var(--text-muted); }

  [data-theme="dark"] .evento-prio.alta { background: #450a0a; color: #fca5a5; }
  [data-theme="dark"] .evento-prio.media { background: #451a03; color: #fcd34d; }

  .evento-del {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: .9rem;
    padding: 2px;
    transition: color .2s;
    opacity: .4;
  }

  .evento-del:hover { color: #ef4444; opacity: 1; }

  .sem-eventos {
    text-align: center;
    color: var(--text-muted);
    font-size: .82rem;
    padding: 16px 0;
  }

  /* Form novo */
  .form-novo {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-novo input, .form-novo select, .form-novo textarea {
    padding: 9px 11px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: .82rem;
    font-family: inherit;
    outline: none;
    transition: border-color .2s, background .3s;
    background: var(--input-bg);
    color: var(--text);
  }

  .form-novo input:focus, .form-novo select:focus, .form-novo textarea:focus {
    border-color: var(--accent);
  }

  .form-novo textarea { resize: none; height: 50px; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .form-row-3 {
    display: grid;
    grid-template-columns: auto 1fr 1fr;
    gap: 6px;
  }

  .btn-add {
    background: linear-gradient(135deg, #004704, #059669);
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
  }

  .btn-add:hover { opacity: .9; }

  /* Proximos */
  .proximos-lista { display: flex; flex-direction: column; gap: 4px; }

  .proximo-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 9px;
    border-radius: 8px;
    background: var(--bg-item);
    font-size: .78rem;
    cursor: pointer;
    transition: background .2s;
  }

  .proximo-item:hover { background: var(--hover-dia); }

  .proximo-item.done { opacity: .4; text-decoration: line-through; }

  .proximo-data {
    font-weight: 600;
    color: var(--accent);
    min-width: 42px;
    font-size: .68rem;
  }

  .proximo-texto {
    color: var(--text-secondary);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Contadores */
  .contadores { display: flex; gap: 14px; }

  .contador { text-align: center; }

  .contador .num { font-size: 1.2rem; font-weight: 700; }

  .contador .label {
    font-size: .6rem;
    opacity: .8;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  /* Filtro dropdown */
  .filtro-wrapper { position: relative; }

  .filtro-dropdown {
    display: none;
    position: absolute;
    top: 42px;
    right: 0;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px;
    min-width: 160px;
    box-shadow: 0 4px 20px var(--shadow);
    z-index: 100;
  }

  .filtro-dropdown.show { display: block; }

  .filtro-dropdown label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    font-size: .78rem;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background .15s;
  }

  .filtro-dropdown label:hover { background: var(--bg-item); }

  .filtro-dropdown input[type="checkbox"] {
    accent-color: var(--accent);
  }

  .filtro-section {
    font-size: .65rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    padding: 6px 8px 2px;
    font-weight: 600;
  }

  .filtro-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* Indicador de sync */
  .saving-indicator {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: white;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: .72rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transition: opacity .3s;
    z-index: 999;
    pointer-events: none;
  }

  .saving-indicator.visible { opacity: 1; }

  .saving-dot {
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .3; }
  }

  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; height: auto; }
  }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ── Supabase (mesmo padrão do tracker) ──
  const SUPA_URL = 'https://mepzoxoahpwcvvlymlfh.supabase.co';
  const SUPA_KEY = 'sb_publishable_Z9E8KLU8ZIMcWjD-bMG5gg_eM585qWq';
  const db = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  const SYNC_KEY = 'elyda-agenda-v1';

  let mesAtual = new Date().getMonth();
  let anoAtual = new Date().getFullYear();
  let diaSelecionado = null;
  let state = []; // array de eventos

  function getEventos() {
    return state;
  }

  async function salvarEventos(ev) {
    state = ev;
    const ind = document.getElementById('savingIndicator');
    ind.classList.add('visible');
    try {
      await db.from('tracker_sync').upsert({
        key: SYNC_KEY,
        data: { eventos: ev },
        updated_at: new Date().toISOString()
      });
    } catch(e) { console.error('Erro ao salvar:', e); }
    setTimeout(() => ind.classList.remove('visible'), 1200);
  }

  async function carregarEventos() {
    try {
      const { data } = await db.from('tracker_sync')
        .select('data')
        .eq('key', SYNC_KEY)
        .single();
      if (data && data.data && data.data.eventos) {
        state = data.data.eventos;
        return true;
      }
    } catch(e) { console.error('Erro ao carregar:', e); }
    return false;
  }

  function getFiltros() {
    const checks = document.querySelectorAll('#filtro-dropdown input[type="checkbox"]');
    const f = {};
    checks.forEach(c => f[c.dataset.filtro] = c.checked);
    return f;
  }

  function filtroChanged() { renderCalendario(); renderEventosDia(); }

  function filtrarEventos(eventos) {
    const f = getFiltros();
    return eventos.filter(ev => {
      if (ev.concluido && !f.concluidos) return false;
      if (!ev.concluido && !f.pendentes) return false;
      const prio = ev.prioridade || 'baixa';
      if (!f[prio]) return false;
      if (!f[ev.categoria]) return false;
      return true;
    });
  }

  // ── Tema ──
  function toggleTema() {
    const atual = document.documentElement.getAttribute('data-theme');
    const novo = atual === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', novo);
    localStorage.setItem('elyda_tema', novo);
    document.getElementById('theme-btn').innerHTML = novo === 'dark' ? '&#9788;' : '&#9790;';
  }

  function carregarTema() {
    const salvo = localStorage.getItem('elyda_tema') || 'dark';
    document.documentElement.setAttribute('data-theme', salvo);
    document.getElementById('theme-btn').innerHTML = salvo === 'dark' ? '&#9788;' : '&#9790;';
  }

  // ── Filtro dropdown ──
  function toggleFiltro() {
    document.getElementById('filtro-dropdown').classList.toggle('show');
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.filtro-wrapper')) {
      document.getElementById('filtro-dropdown').classList.remove('show');
    }
  });

  // ── Calendario ──
  function renderCalendario() {
    const grid = document.getElementById('grid-dias');
    grid.innerHTML = '';

    const meses = ['Janeiro','Fevereiro','Marco','Abril','Maio','Junho',
                   'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    document.getElementById('titulo-mes').textContent = `${meses[mesAtual]} ${anoAtual}`;

    const primeiroDia = new Date(anoAtual, mesAtual, 1).getDay();
    const ultimoDia = new Date(anoAtual, mesAtual + 1, 0).getDate();
    const hoje = new Date();
    const todosEventos = getEventos();
    const eventos = filtrarEventos(todosEventos);

    const diasMesAnterior = new Date(anoAtual, mesAtual, 0).getDate();
    for (let i = primeiroDia - 1; i >= 0; i--) {
      grid.appendChild(criarDia(diasMesAnterior - i, true));
    }

    for (let d = 1; d <= ultimoDia; d++) {
      const dataStr = formatarData(anoAtual, mesAtual, d);
      const evDia = eventos.filter(e => e.data === dataStr);
      const ehHoje = hoje.getDate() === d && hoje.getMonth() === mesAtual && hoje.getFullYear() === anoAtual;
      grid.appendChild(criarDia(d, false, ehHoje, diaSelecionado === dataStr, evDia, dataStr));
    }

    const totalCells = primeiroDia + ultimoDia;
    const restante = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let d = 1; d <= restante; d++) {
      grid.appendChild(criarDia(d, true));
    }

    atualizarContadores(todosEventos);
    renderProximos(todosEventos);
  }

  function criarDia(numero, outroMes, ehHoje, ehSelecionado, eventos, dataStr) {
    const div = document.createElement('div');
    div.className = 'dia';
    if (outroMes) div.classList.add('outro-mes');
    if (ehHoje) div.classList.add('hoje');
    if (ehSelecionado) div.classList.add('selecionado');

    const numDiv = document.createElement('div');
    numDiv.className = 'numero';
    numDiv.textContent = numero;
    div.appendChild(numDiv);

    if (eventos && eventos.length > 0) {
      const evDiv = document.createElement('div');
      evDiv.className = 'eventos';
      // Ordenar: alta primeiro, concluidos por ultimo
      const sorted = [...eventos].sort((a, b) => {
        if (a.concluido !== b.concluido) return a.concluido ? 1 : -1;
        const prioOrder = { alta: 0, media: 1, baixa: 2 };
        return (prioOrder[a.prioridade || 'baixa'] || 2) - (prioOrder[b.prioridade || 'baixa'] || 2);
      });
      sorted.slice(0, 3).forEach(ev => {
        const span = document.createElement('div');
        const prio = ev.prioridade || 'baixa';
        span.className = `evento-mini ${ev.categoria} prio-dot-${prio}`;
        if (ev.concluido) span.classList.add('concluido');
        span.textContent = ev.hora ? `${ev.hora} ${ev.titulo}` : ev.titulo;
        evDiv.appendChild(span);
      });
      if (eventos.length > 3) {
        const mais = document.createElement('div');
        mais.className = 'mais';
        mais.textContent = `+${eventos.length - 3} mais`;
        evDiv.appendChild(mais);
      }
      div.appendChild(evDiv);
    }

    if (dataStr) div.onclick = () => { diaSelecionado = dataStr; renderCalendario(); renderEventosDia(); };
    return div;
  }

  function renderEventosDia() {
    const container = document.getElementById('eventos-dia');
    const titulo = document.getElementById('titulo-dia');

    if (!diaSelecionado) {
      container.innerHTML = '<div class="sem-eventos">Clique em um dia para ver</div>';
      titulo.textContent = 'Selecione um dia';
      return;
    }

    const [a, m, d] = diaSelecionado.split('-');
    const diasSemana = ['Domingo','Segunda','Terca','Quarta','Quinta','Sexta','Sabado'];
    const data = new Date(+a, +m - 1, +d);
    titulo.textContent = `${diasSemana[data.getDay()]}, ${d}/${m}`;

    let eventos = getEventos().filter(e => e.data === diaSelecionado);
    eventos = filtrarEventos(eventos);
    eventos.sort((a, b) => {
      if (a.concluido !== b.concluido) return a.concluido ? 1 : -1;
      const prioOrder = { alta: 0, media: 1, baixa: 2 };
      const pa = prioOrder[a.prioridade || 'baixa'] || 2;
      const pb = prioOrder[b.prioridade || 'baixa'] || 2;
      if (pa !== pb) return pa - pb;
      return (a.hora || '').localeCompare(b.hora || '');
    });

    if (eventos.length === 0) {
      container.innerHTML = '<div class="sem-eventos">Nenhum compromisso neste dia</div>';
      return;
    }

    container.innerHTML = eventos.map(ev => {
      const prio = ev.prioridade || 'baixa';
      const prioLabel = { alta: 'URGENTE', media: 'Media', baixa: '' };
      return `
      <div class="evento-item ${ev.concluido ? 'done' : ''} prio-${prio}">
        <input type="checkbox" class="evento-check" ${ev.concluido ? 'checked' : ''} onchange="toggleConcluido(${ev.id})">
        <div class="evento-hora">${ev.hora || '--:--'}</div>
        <div class="evento-info">
          <div class="evento-titulo">${escapeHtml(ev.titulo)}</div>
          ${ev.obs ? `<div style="font-size:.68rem;color:var(--text-obs);margin-top:2px">${escapeHtml(ev.obs)}</div>` : ''}
          <div class="evento-meta">
            <span class="evento-cat ${ev.categoria}">${nomeCategoria(ev.categoria)}</span>
            ${prio !== 'baixa' ? `<span class="evento-prio ${prio}">${prioLabel[prio]}</span>` : ''}
          </div>
        </div>
        <button class="evento-del" onclick="removerEvento(${ev.id})" title="Remover">&#10005;</button>
      </div>`;
    }).join('');
  }

  async function toggleConcluido(id) {
    const eventos = getEventos();
    const ev = eventos.find(e => e.id === id);
    if (ev) ev.concluido = !ev.concluido;
    renderCalendario();
    renderEventosDia();
    await salvarEventos(eventos);
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function nomeCategoria(cat) {
    return { pessoal: 'Pessoal', trabalho: 'Trabalho', compra: 'Compra', lembrete: 'Lembrete' }[cat] || cat;
  }

  async function adicionarEvento() {
    const titulo = document.getElementById('novo-titulo').value.trim();
    if (!titulo) { document.getElementById('novo-titulo').focus(); return; }
    if (!diaSelecionado) { alert('Selecione um dia primeiro!'); return; }

    const eventos = getEventos();
    eventos.push({
      id: Date.now(),
      data: diaSelecionado,
      titulo,
      hora: document.getElementById('novo-hora').value,
      categoria: document.getElementById('novo-cat').value,
      prioridade: document.getElementById('novo-prio').value,
      obs: document.getElementById('novo-obs').value.trim(),
      concluido: false
    });

    document.getElementById('novo-titulo').value = '';
    document.getElementById('novo-obs').value = '';

    renderCalendario();
    renderEventosDia();
    await salvarEventos(eventos);
  }

  async function removerEvento(id) {
    const eventos = getEventos().filter(e => e.id !== id);
    state = eventos;
    renderCalendario();
    renderEventosDia();
    await salvarEventos(eventos);
  }

  function mudarMes(delta) {
    mesAtual += delta;
    if (mesAtual > 11) { mesAtual = 0; anoAtual++; }
    if (mesAtual < 0) { mesAtual = 11; anoAtual--; }
    renderCalendario();
  }

  function irParaHoje() {
    const hoje = new Date();
    mesAtual = hoje.getMonth();
    anoAtual = hoje.getFullYear();
    diaSelecionado = formatarData(anoAtual, mesAtual, hoje.getDate());
    renderCalendario();
    renderEventosDia();
  }

  function renderProximos(todosEventos) {
    const container = document.getElementById('proximos-lista');
    const eventos = todosEventos || getEventos();
    const hojeStr = formatarData(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());

    const proximos = eventos
      .filter(e => e.data >= hojeStr && !e.concluido)
      .sort((a, b) => {
        const prioOrder = { alta: 0, media: 1, baixa: 2 };
        const pa = prioOrder[a.prioridade || 'baixa'] || 2;
        const pb = prioOrder[b.prioridade || 'baixa'] || 2;
        if (a.data !== b.data) return a.data.localeCompare(b.data);
        if (pa !== pb) return pa - pb;
        return (a.hora || '').localeCompare(b.hora || '');
      })
      .slice(0, 8);

    if (proximos.length === 0) {
      container.innerHTML = '<div class="sem-eventos">Tudo em dia!</div>';
      return;
    }

    container.innerHTML = proximos.map(ev => {
      const [a, m, d] = ev.data.split('-');
      const prio = ev.prioridade || 'baixa';
      return `
        <div class="proximo-item prio-${prio}" onclick="diaSelecionado='${ev.data}'; renderCalendario(); renderEventosDia();">
          <div class="proximo-data">${d}/${m}</div>
          <div class="proximo-texto">${ev.hora ? ev.hora + ' — ' : ''}${escapeHtml(ev.titulo)}</div>
          <div class="evento-mini ${ev.categoria}" style="font-size:.58rem">${nomeCategoria(ev.categoria)}</div>
        </div>`;
    }).join('');
  }

  function atualizarContadores(todosEventos) {
    const eventos = todosEventos || getEventos();
    const hoje = new Date();
    const hojeStr = formatarData(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());

    const pendentes = eventos.filter(e => !e.concluido);

    document.getElementById('cont-hoje').textContent = pendentes.filter(e => e.data === hojeStr).length;

    const em7dias = new Date(hoje);
    em7dias.setDate(em7dias.getDate() + 7);
    const sem7Str = formatarData(em7dias.getFullYear(), em7dias.getMonth(), em7dias.getDate());
    document.getElementById('cont-semana').textContent = pendentes.filter(e => e.data >= hojeStr && e.data <= sem7Str).length;

    document.getElementById('cont-mes').textContent = pendentes.filter(e => {
      const [a, m] = e.data.split('-');
      return +a === anoAtual && +m === mesAtual + 1;
    }).length;
  }

  function formatarData(ano, mes, dia) {
    return `${ano}-${String(mes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
  }

  function gerarExemplos() {
    const hoje = new Date();
    const y = hoje.getFullYear(), m = hoje.getMonth(), d = hoje.getDate();

    const exemplos = [
      { data: formatarData(y, m, d), titulo: 'Consulta pediatra — Joao', hora: '09:00', categoria: 'pessoal', prioridade: 'alta', obs: 'Levar cartao do SUS', concluido: false },
      { data: formatarData(y, m, d), titulo: 'Visita obra Junior', hora: '14:00', categoria: 'trabalho', prioridade: 'alta', obs: 'Conferir fundacao', concluido: false },
      { data: formatarData(y, m, d), titulo: 'Comprar cimento (30 sacos)', hora: '16:00', categoria: 'compra', prioridade: 'media', obs: 'Deposito Silva', concluido: true },
      { data: formatarData(y, m, d + 1), titulo: 'Reuniao cliente Dayana', hora: '10:00', categoria: 'trabalho', prioridade: 'alta', obs: 'Apresentar orcamento', concluido: false },
      { data: formatarData(y, m, d + 1), titulo: 'Buscar meninos na escola', hora: '17:30', categoria: 'pessoal', prioridade: 'baixa', obs: '', concluido: false },
      { data: formatarData(y, m, d + 2), titulo: 'Entrega de laudo — Pedro', hora: '08:00', categoria: 'trabalho', prioridade: 'alta', obs: 'Imprimir 2 vias', concluido: false },
      { data: formatarData(y, m, d + 2), titulo: 'Comprar vergalhao', hora: '11:00', categoria: 'compra', prioridade: 'media', obs: '3/8 e 5/16', concluido: false },
      { data: formatarData(y, m, d + 3), titulo: 'Dentista Elyda', hora: '14:30', categoria: 'pessoal', prioridade: 'baixa', obs: '', concluido: false },
      { data: formatarData(y, m, d + 4), titulo: 'Pagar CREA', hora: '08:00', categoria: 'lembrete', prioridade: 'alta', obs: 'Vence dia 30', concluido: false },
      { data: formatarData(y, m, d + 5), titulo: 'Visita obra Leonardo', hora: '09:00', categoria: 'trabalho', prioridade: 'media', obs: 'Medir laje', concluido: false },
      { data: formatarData(y, m, d + 7), titulo: 'Vacina meninos', hora: '10:00', categoria: 'pessoal', prioridade: 'media', obs: '', concluido: false },
    ];

    exemplos.forEach(e => e.id = Date.now() + Math.random() * 10000);
    return exemplos;
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement.id === 'novo-titulo') adicionarEvento();
  });

  // ── Init (igual tracker) ──
  async function init() {
    carregarTema();
    const carregou = await carregarEventos();
    if (!carregou || state.length === 0) {
      state = gerarExemplos();
      await salvarEventos(state);
    }
    irParaHoje();
  }

  init();
</script>
