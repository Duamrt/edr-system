<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>EDR System — Versão atualizada</title>
<meta http-equiv="refresh" content="0; url=../index.html">
<link rel="canonical" href="https://sistema.edreng.com.br/">
<script>
// Sai de qualquer rota /v1/* pra raiz, limpa o SW antigo se existir
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(rs => {
    rs.forEach(r => { if (r.scope.includes('/v1/')) r.unregister(); });
  });
}
location.replace('../index.html');
</script>
<style>body{font-family:system-ui;background:#0a0a0a;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;text-align:center}</style>
</head>
<body>
<div>
  <h2>Sistema atualizado</h2>
  <p>Redirecionando para a versão atual...</p>
  <a href="../index.html" style="color:#10b981;">Ir agora</a>
</div>
</body>
</html>
